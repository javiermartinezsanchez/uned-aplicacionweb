<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title>Usuarios</title>
</head>
<body>
<section>
	<div class="container">
		<h1>Usuarios</h1>
		<br>
		<h4 ><span th:text="#{usuario.title} + ':'"></span>
			<span sec:authentication="principal.username"></span>
		</h4>
		<div class="form-group">
			<span><a th:href="@{/admin/usuario/newusuario}" th:text="#{mensaje.nuevo} + ' ' + #{usuario.title} ">Nuevo Usuario</a></span>
		</div>

	

		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th>ID</th>
					<th th:text="#{usuario.email}">email</th>
					<th th:text="#{usuario.nombre}">Nombre</th>
					<th th:text="#{usuario.role}">Role</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="usuario : ${usuario}">
					<td th:text="${usuario.email}">ID</td>
					<td th:text="${usuario.nombrecompleto}">ID</td>
					<td th:text="${usuario.rol}">ID</td>
					<td><a th:href="@{/admin/usuario/{id}(id=${usuario.id})}" class="btn btn-primary">Modificar</a></td>
				</tr>
			</tbody>
		</table>
	</div>
</section>
</body>
</html>
