#spring.application.name=app
spring.application.name=app
spring.messages.basename=traducciones
spring.messages.encoding=UTF-8

# Límite de los ficheros que se pueden subir
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
#spring.servlet.multipart.max-file-count=50
# Obligamos a Tomcat a aceptar el flujo de un archivo mayor del que tiene configurado (no modificable) y así
# que nuestro filtro pueda capturar el error y devolvelo al cliente.
# Establemos el máximo de campos de un formulario en 100.
#server.tomcat.max-swallow-size=-1
server.tomcat.max-parameter-count=100
server.tomcat.max-part-count=100

# Redirige cualquier error de infraestructura (como el archivo grande) a esta ruta


# Muestra qué método del controlador captura cada URL
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE

# Muestra el flujo interno de seguridad y evaluación de @PreAuthorize
logging.level.org.springframework.security=DEBUG

logging.level.es.alumno.uned=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# Configuración de la base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/practica
spring.datasource.username=practica
spring.datasource.password=practica
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Evita que se añada el prefijo a los campos de la clave compuesta
spring.jpa.properties.hibernate.implicit_naming_strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# Obliga a respetar textualmente el nombre en mayúsculas que se definen en el @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

