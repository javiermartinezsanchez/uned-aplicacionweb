<fichacurso th:fragment="cursoCard1(curso)">
<div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100 w-100">
    <img th:src="${curso.uriImagen != null and !#strings.isEmpty(curso.uriImagen)} 
             ? @{/images/curso/{img}(img=${curso.uriImagen})} 
             : @{/images/curso/default-curso.png}"
         class="card-img-top card-img-fixed"
         alt="Imagen del curso">
	<div class="card-body d-flex flex-column p-3 pb-3" style="min-height: 50px">
        <h5 class="card-title fw-bold" style="min-height: 48px;" th:text="${curso.titulo}"></h5>
        <p class="card-text text-muted small flex-grow-1 descripcion-limitada"
           th:text="${curso.descripcion}">
        </p>
        <span class="text-secundary small mb-3 d-block"
           th:text="${curso.areaTematicaText}">
        </span>
        <th:block th:if="${yaInscrito}">
    		<div th:insert="~{::infocursoEstudiante}"></div>
		</th:block>
		<div class="d-flex align-items-center justify-content-between mb-3">
		    <div th:insert="~{fragments/botones :: btnLink(
		        #{curso.vercurso},
		        @{'/viewcurso/' + ${curso.id}},
		        'btn-primary btn-sm px-2 text-nowrap',
		        'bi-info-circle'
		    )}"></div>
		    <th:block th:unless="${isProfesor}">
		        <div th:if="${yaInscrito == null or !yaInscrito}" 
		             th:insert="~{fragments/botones :: btnLink(
		                #{curso.subscribirse},
		                @{'/estudiante/subscribircurso/' + ${curso.id} },
		                'btn-outline-success btn-sm px-2 text-nowrap',
		                'bi-clipboard-check'
		             )}">
		        </div>
		        <th:block th:if="${yaInscrito}" th:switch="${#strings.toString(estadoCurso)}">
		            <div th:case="'ACTIVO'" th:insert="~{fragments/botones :: btnLink(
		                'Continuar',
		                @{'/estudiante/micurso/' + ${curso.id} },
		                'btn-success btn-sm px-2 text-nowrap',
		                'bi-play-fill'
		            )}"></div>
		            <div th:case="'REVISADO'" th:insert="~{fragments/botones :: btnLink(
		                'Continuar',
		                @{'/estudiante/micurso/' + ${curso.id} },
		                'btn-success btn-sm px-2 text-nowrap',
		                'bi-play-fill'
		            )}"></div>
		            <div th:case="'COMPLETADO'" th:insert="~{fragments/botones :: btnLinkTarget(
		                'Certificado',
		                @{'/estudiante/curso/certificado/' + ${curso.id} },
		                false,
		                '_blank',
		                'btn-success btn-sm px-2 text-nowrap',
		                'bi-award'
		            )}"></div>
		            <div th:case="'PENDIENTE_REVISION'" th:insert="~{fragments/botones :: btnLink(
		                'Ver Entregas',
		                @{'/estudiante/revision/' + ${curso.id} },
		                'btn-outline-warning btn-sm px-2 text-nowrap',
		                'bi-eye'
		            )}"></div>
		            <div th:case="*"></div>
		        </th:block>
		    </th:block>
		</div>

        <div class="d-flex align-items-center justify-content-between text-muted small border-top pt-2">
            <span class="fw-semibold">⭐ <span th:text="${curso.valoracion}">4.8</span> / 5</span>
			<span><i class="bi bi-clock me-2"></i><strong th:text="${curso.duracion}">40</strong>h.</span>
            <span class="fw-semibold text-secondary">👥 <span th:text="${curso.usuariosRegistrados}">0</span></span>

        </div>
   
    </div>
</div>

</fichacurso>
<!-- Bloque visual de progreso/estado exclusivo para alumnos inscritos -->
<div th:fragment="infocursoEstudiante">
    <div class="mb-3" th:switch="${#strings.toString(estadoCurso)}">
        <div th:case="'ACTIVO'">
            <div class="d-flex justify-content-between align-items-center mb-1 small">
                <span class="text-muted fw-medium">Progreso del curso</span>
                <span class="text-primary fw-bold" th:text="${progresoCurso + '%'}">0%</span>
            </div>
            <div class="progress" style="height: 6px; background-color: #e9ecef;">
                <div class="progress-bar bg-primary rounded" role="progressbar" th:style="'width: ' + ${progresoCurso} + '%'"></div>
            </div>
        </div>
        <div th:case="'REVISADO'">
            <div class="d-flex justify-content-between align-items-center mb-1 small">
                <span class="text-muted fw-medium">Progreso (Revisado)</span>
                <span class="text-primary fw-bold" th:text="${progresoCurso + '%'}">0%</span>
            </div>
            <div class="progress" style="height: 6px; background-color: #e9ecef;">
                <div class="progress-bar bg-info rounded" role="progressbar" th:style="'width: ' + ${progresoCurso} + '%'"></div>
            </div>
        </div>
        <div th:case="'COMPLETADO'">
            <div class="d-flex justify-content-between align-items-center mb-1 small">
                <span class="text-success fw-bold"><i class="bi bi-patch-check-fill me-1"></i> ¡Completado!</span>
                <span class="text-success fw-bold">100%</span>
            </div>
            <div class="progress" style="height: 6px; background-color: #e9ecef;">
                <div class="progress-bar bg-success rounded" role="progressbar" style="width: 100%"></div>
            </div>
        </div>
        <div th:case="'PENDIENTE_REVISION'">
            <div class="d-flex justify-content-between align-items-center mb-1 small">
                <span class="text-warning fw-semibold"><i class="bi bi-hourglass-split me-1"></i> Esperando revisión</span>
                <span class="text-warning fw-bold" th:text="${progresoCurso + '%'}">0%</span>
            </div>
            <div class="progress" style="height: 6px; background-color: #e9ecef;">
                <div class="progress-bar bg-warning rounded" role="progressbar" th:style="'width: ' + ${progresoCurso} + '%'"></div>
            </div>
        </div>
        <div th:case="'BLOQUEADO'">
            <span class="badge bg-secondary text-wrap py-2 w-100"><i class="bi bi-lock-fill me-1"></i> Curso Bloqueado</span>
        </div>
        <div th:case="'BAJA'">
            <span class="badge bg-danger text-wrap py-2 w-100"><i class="bi bi-exclamation-octagon me-1"></i> Tramitado de Baja</span>
        </div>
    </div>
</div>

<div th:fragment="contenidoExtra" class="card mt-3">

   <div class="card-header bg-body-tertiary text-black">
		<a class="d-inline-flex align-items-center text-dark text-decoration-none" 
           data-bs-toggle="collapse" data-bs-target="#datosExtra" role="button" aria-expanded="false">
           <span class="me-2 icono-giro">▼</span>
           <h5 class="mb-0" th:text="#{curso.contenidosExtra}"></h5>
   		</a>
   </div>
   <div class="collapse" id="datosExtra">
      <div class="card-body">
        <table class="table" id="tablaContenidos">
            <thead>
                <tr>
                    <th th:text="#{curso.contenidosExtra}">Descripción</th>
                    <th th:text="#{comun.tipo(#{curso.contenido})}">Tipo</th>
                    <th th:text="#{curso.contenidosExtra}">Recurso (Archivo/URL)</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
        		<tr th:each="contenido, stat : *{contenidosExtra}">
            		<input type="hidden" th:field="*{contenidosExtra[__${stat.index}__].id}" />
            		<td>
                		<input type="text" th:field="*{contenidosExtra[__${stat.index}__].descripcion}" 
                       class="form-control" required />
            		</td>
            		<td>
                		<select th:field="*{contenidosExtra[__${stat.index}__].tipoContenido}" 
                        	class="form-select" th:onchange="|toggleInputType(this, ${stat.index})|">
                    		<option value="EXTERNO">Externo (URL)</option>
                    		<option value="PROPIO">Propio (Archivo)</option>
                		</select>
            		</td>
            		<td>
						<div th:switch="${contenido.tipoContenido?.name()}" class="d-inline">
				
				    		<div th:case="PROPIO" class="input-group d-inline-flex" style="vertical-align: middle;">
				        		<label class="btn btn-outline-secondary btn-sm" th:for="'file-' + ${stat.index}">
				            		<i class="bi bi-file-earmark-pdf"></i> Adjuntar
				        		</label>
				        		<input type="file" name="file" th:id="'file-' + ${stat.index}" class="d-none" accept="application/pdf" />
				        		<input type="text" class="form-control form-control-sm bg-light text-truncate" 
				               		th:value="${contenido.nombreReal != null ? '📄 ' + contenido.nombreReal : 'Sin archivo'}" readonly />
				                <input type="hidden" th:field="*{contenidosExtra[__${stat.index}__].id}" />
				        		<input type="hidden" th:field="*{contenidosExtra[__${stat.index}__].nombreReal}" />
				    		</div>
						    <input th:case="EXTERNO" type="url" th:field="*{contenidosExtra[__${stat.index}__].uri}" 
				           		class="form-control form-control-sm d-inline-block" placeholder="https://..." style="width: auto;" />
				    		<span th:case="*" class="badge bg-secondary"></span>	            
						</div>
            		</td>
            		<td>
                		<button type="button" class="btn text-danger" 
                       		th:onclick="this.closest('tr').remove()">
                   			<i class="bi bi-x-circle-fill"></i>
                		</button>
            		</td>
        		</tr>
        </table>
        <div class="text-end">
	        <button type="button" class="btn btn-sm btn-outline-success" onclick="addContenidoExtraRow()">
	            <i class="bi bi-plus-lg"></i><span th:text="#{curso.contenidosExtra}">Extra</span>
	        </button>
        </div>
      </div>
    </div>
</div>
