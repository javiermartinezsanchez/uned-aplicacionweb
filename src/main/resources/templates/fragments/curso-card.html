<fichacurso th:fragment="cursoCard1(curso)">
<div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100 w-100">
    <img th:src="@{/images/curso/{img}(img=${curso.uriImagen})}"
         class="card-img-top card-img-fixed"
         alt="Imagen del curso">
    <div class="card-body p-4">
        <h5 class="fw-bold mb-2" th:text="${curso.titulo}"></h5>
        <p class="text-muted small descripcion-limitada"
           th:text="${curso.descripcion}">
        </p>
		<div class="d-flex justify-content-between align-items-center gap-2 mb-3">
		    <div th:insert="~{fragments/botones :: btnLink(
		        #{curso.vercurso},
		        @{'/viewcurso/' + ${curso.id}},
		        'btn-primary btn-sm px-2 text-nowrap',
		        'bi-info-circle'
		    )}"></div>
		    <div th:insert="~{fragments/botones :: btnLink(
		        #{curso.subscribirse},
		        @{'/curso/' + ${curso.id} + '/suscribir'},
		        'btn-outline-success btn-sm px-2 text-nowrap',
		        'bi-clipboard-check'
		    )}"></div>
		</div>
        <div class="d-flex justify-content-between align-items-center mt-2">
            <span class="fw-semibold">
                ⭐ <span th:text="${curso.valoracion}">4.8</span> / 5
            </span>
		    <div class="d-flex align-items-center text-secondary">
			    <!-- El icono y el texto ahora van juntos con una separación controlada por 'me-2' o gap -->
			    <i class="bi bi-clock me-2"></i>
			    <span>
			        <strong th:text="${curso.duracion}">40</strong>h.
			    </span>
			 </div>
 
            <span class="fw-semibold text-secondary">
                👥 <span th:text="${curso.usuariosRegistrados}">0</span>
            </span>
        </div>
    </div>
</div>

</fichacurso>


<fichacurso th:fragment="cursoCard4(curso)"> 
<div class="card shadow-sm" style="width: 22rem;">
     <img th:src="@{'/images/curso/' + ${curso.uriImagen}}" class="card-img-top" alt="Imagen del curso">

    <div class="card-body">
        <h5 class="card-title" th:text="${curso.titulo}">Título del curso</h5>
        <p class="card-text text-muted" th:text="${curso.descripcion}">Descripción breve del curso...</p>

        <div class="d-flex justify-content-between mt-3">
            <a th:href="@{'/curso/' + ${curso.id}}" class="btn btn-primary">Ver curso</a>
            <a th:href="@{'/curso/' + ${curso.id} + '/suscribir'}" class="btn btn-outline-success">Suscribirse</a>
        </div>

        <hr>

        <div class="d-flex justify-content-between">
            <span>Valoración: ⭐⭐⭐⭐☆</span>
            <a th:href="@{'/curso/' + ${curso.id} + '/valorar'}" class="text-danger">
                ❤️ Valorar
            </a>
        </div>
    </div>
</div>
</fichacurso> 
<div th:fragment="contenidoExtra" class="card mt-3">
 <div class="card-header bg-body-tertiary text-black">
			<a class="d-inline-flex align-items-center text-dark text-decoration-none" 
               data-bs-toggle="collapse" href="#datosExtra" role="button" aria-expanded="false">
        		<span class="me-2 icono-giro">▼</span>
        		<h5 class="mb-0" th:text="#{curso.contenidosExtra}">ssss</h5>
    		</a>
        </div>
        <div class="card-body" id="datosExtra">
        <table class="table" id="tablaContenidos">
            <thead>
                <tr>
                    <th th:text="#{curso.contenidosExtra}">Descripción</th>
                    <th th:text="#{comun.tipo(#{curso.contenido})}">Tipo</th>
                    <th th:text="#{curso.contenidosExtra}">Recurso (Archivo/URL)</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
        <!-- Iteramos sobre los contenidos actuales si existen -->
        <tr th:each="contenido, stat : *{contenidosExtra}">
            <!-- Campo oculto para mantener el ID y no duplicar registros al guardar -->
            <input type="hidden" th:field="*{contenidosExtra[__${stat.index}__].id}" />
            
            <td>
                <input type="text" 
                       th:field="*{contenidosExtra[__${stat.index}__].descripcion}" 
                       class="form-control" required />
            </td>
            <td>
                <select th:field="*{contenidosExtra[__${stat.index}__].tipoContenido}" 
                        class="form-select" 
                        th:onchange="|toggleInputType(this, ${stat.index})|">
                    <option value="EXTERNO">Externo (URL)</option>
                    <option value="PROPIO">Propio (Archivo)</option>
                </select>
            </td>
            <td>
<div th:switch="${contenido.tipoContenido?.name()}" class="d-inline">

    <!-- CASO PROPIO: Mantiene los 38px estándar sin romper la línea -->
    <div th:case="PROPIO" class="input-group d-inline-flex" style="vertical-align: middle;">
        <!-- 1. Botón visual que activa la subida -->
        <label class="btn btn-outline-secondary btn-sm" th:for="'file-' + ${stat.index}">
            <i class="bi bi-file-earmark-pdf"></i> Adjuntar
        </label>
        
        <!-- 2. El input file REAL. OJO: Debe llevar name="file", NO th:field -->
        <input type="file" name="file" th:id="'file-' + ${stat.index}" class="d-none" accept="application/pdf" />

        <!-- 3. Campo de texto simulado que muestra el valor actual en la línea -->
        <input type="text" class="form-control form-control-sm bg-light text-truncate" 
               th:value="${contenido.nombreReal != null ? '📄 ' + contenido.nombreReal : 'Sin archivo'}" 
               readonly />
               
        <!-- 4. Campo oculto para que Spring no pierda los metadatos actuales del DTO al enviar -->
        <input type="hidden" th:field="*{contenidosExtra[__${stat.index}__].id}" />
        <input type="hidden" th:field="*{contenidosExtra[__${stat.index}__].nombreReal}" />
    </div>

    <!-- CASO EXTERNO: Tu código original limpio (añadido form-control-sm para igualar alturas) -->
    <input th:case="EXTERNO" type="url" th:field="*{contenidosExtra[__${stat.index}__].uri}" 
           class="form-control form-control-sm d-inline-block" placeholder="https://..." style="width: auto;" />

    <!-- CASO POR DEFECTO -->
    <span th:case="*" class="badge bg-secondary"></span>	            
</div>

            </td>
            <td>
                <!-- Botón de eliminar fila existente -->
                <button type="button" class="btn text-danger" 
                       th:onclick="this.closest('tr').remove()">
                   <i class="bi bi-x-circle-fill"></i>
                </button>
  
            </td>
        </tr>
        </table>
        <div class="text-end">
	        <button type="button" class="btn btn-sm btn-outline-success" onclick="addContenidoExtraRow()">
	            <i class="bi bi-plus-lg"></i><span th:text="#{curso.contenidosExtra}">Extra</span>
	        </button>
        </div>
    </div>
</div>
