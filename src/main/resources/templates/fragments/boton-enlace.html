<!-- Fragmento reutilizable para botones-enlace -->
<div th:fragment="btnLink(texto, url, estilo)">
    <a th:href="@{${url}}"
       th:text="${texto}"
       th:class="'btn ' + ${estilo}">
    </a>
</div>

<!-- Fragmento reutilizable para botones-submit -->
<div th:fragment="btnSubmit(texto, estilo)">
    <button type="submit"
            th:text="${texto}"
            th:class="'btn ' + ${estilo}">
    </button>
</div>
