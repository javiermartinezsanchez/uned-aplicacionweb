<div th:fragment="frmUsuario">
	<input type="hidden" th:field="*{id}" />
    <div class="row">
	    <div class="col-md-6 mb-3">
	        <label class="form-label" th:text="#{usuario.email}">Email</label>
	        <input type="email" th:field="*{email}" class="form-control w-50">
	        <div class="text-danger" th:errors="*{email}"></div>
        </div>
	    <div class="col-md-6 mb-3" th:if="${isUser == true}" sec:authorize="hasRole('ADMIN')">
	        <label class="form-label" th:text="#{usuario.role}">Rol</label>
	        <select class="form-select" th:field="*{rol}">
	        <option th:value="${''}" th:text="#{rol.select}"></option>
	    		<option th:each="r : ${roles}"
	            		th:value="${r.nombre}"
	            		th:text="${r.descripcion}">
	    		</option>
			</select>
	        <div class="text-danger" th:errors="*{rol}"></div>
	    </div>
	    <div class="col-md-6 mb-3" sec:authorize="not hasRole('ADMIN')" th:if="*{id} != null">
        	<label class="form-label" th:text="#{usuario.role}">Rol</label>
	    	<input type="text" th:value="*{rol}" readonly class="form-control-plaintext w-50">
	    
   		</div>
   		<div class="col-md-6 mb-3" sec:authorize="!isAuthenticated()" th:if="not *{id}">
	    	<input type="hidden" th:field="*{rol}" />
   		</div>
   
    </div>
    <div th:if="*{id} == null">
    <div  th:replace="~{fragments/frmChangePass :: frmChangePass}"></div>
    </div>
    <div class="mb-3" th:if="*{id} != null and *{id} != ''">
        <div th:replace="~{fragments/botones :: btnLink(
        #{command.modificar.password},
        @{/admin/usuario/{id}/password(id=*{id})},
        'btn-warning', 'bi bi-pencil-square'
	    )}">
    	</div>
    
    </div>
    <div class="row">
	    <div class="col-md-4 mb-3">
	        <label class="form-label" th:text="#{usuario.nombre}">Nombre</label>
	        <input type="text" th:field="*{nombre}" class="form-control">
	        <div class="text-danger" th:errors="*{nombre}"></div>
	    </div>
	    <div class="col-md-4 mb-3">
	        <label class="form-label" th:text="#{usuario.apellido1}">Apellido1</label>
	        <input type="text" th:field="*{apellido1}" class="form-control">
	        <div class="text-danger" th:errors="*{apellido1}"></div>
	    </div>
	    <div class="col-md-4 mb-3">
	        <label class="form-label" th:text="#{usuario.apellido2}">Apellido2</label>
	        <input type="text" th:field="*{apellido2}" class="form-control">
	        <div class="text-danger" th:errors="*{apellido2}"></div>
	    </div>
    </div>


</div>
<div th:fragment="frmEstudiante()">
    <div class="mb-1">
        <label class="form-label" th:text="#{usuario.direccion}">Dirección</label>
        <input type="text" th:field="*{direccion}" class="form-control">
        <div class="text-danger" th:errors="*{direccion}"></div>
    </div>
	<div class="row g-3 mb-3">
	    <div class="col-md-4">
	        <label class="form-label" th:text="#{usuario.poblacion}">Población</label>
	        <input type="text" th:field="*{poblacion}" class="form-control  w-50">
	        <div class="text-danger" th:errors="*{poblacion}"></div>
	    </div>
	
	    <div class="col-md-4">
	        <label class="form-label" th:text="#{usuario.provincia}">Provincia</label>
	        <input type="text" th:field="*{provincia}" class="form-control  w-50">
	        <div class="text-danger" th:errors="*{provincia}"></div>
	    </div>
	
	    <div class="col-md-4">
	        <label class="form-label" th:text="#{usuario.codpostal}">Código Postal</label>
	        <div class="col-5 col-md-5 clo-lg-4">
	        <input type="text" th:field="*{codPostal}" class="form-control">
	        </div>
	        <div class="text-danger" th:errors="*{codPostal}"></div>
	    </div>
    </div>
    <div class="row border rounded p-3">
        <!-- Columna Izquierda: Áreas Seleccionadas -->
        <div class="col-md-6">
            <h5 th:text="#{areatematica.estudiante.select}">Áreas de Interés Seleccionadas</h5>
            <div class="area-list" id="listaSeleccionadas">
                <!-- Aquí se renderizarán los checkboxes dinámicamente o estáticamente -->
                <div th:each="area : ${form.areasInteres}" class="area-item d-flex align-items-center">
                    <input type="checkbox" name="areasSeleccionadas" 
                           th:value="${area.id}" 
                           th:data-nombre="${area.titulo}"
                           checked disabled>
                    <span th:text="${area.titulo}"></span>
                    <!-- Botón pequeño para eliminar (opcional, requiere lógica extra) -->
                    <button type="button" class="btn btn-sm btn-outline-danger ms-auto" 
                            th:onclick="eliminarArea(this, ${area.id}, '${area.titulo}')" title="Eliminar">
                        &times;
                    </button>
                </div>
                <p id="mensajeSinAreas" th:if="${form.areasInteres == null or form.areasInteres.isEmpty()}" class="text-muted">
                    No hay áreas seleccionadas.
                </p>
            </div>
        </div>

        <!-- Columna Derecha: Áreas Disponibles -->
        <div class="col-md-6">
            <h5 th:text="#{areatematica.estudiante.disponibles}">Áreas Disponibles</h5>
            <div class="mb-3">
                <select th:replace="~{fragments/selectAreaTematica :: selectArea(${areas},${paramsBusqueda['areaId']})}">  
        		</select>
            
            <button type="button" class="btn btn-primary btn-add" onclick="agregarArea()">
                Añadir a la lista
            </button>
            <th:block th:replace="~{fragments/botones :: btnOnClick(#{comun.addtolist}, 'agregarArea', 'btn-primary btn-add', 'bi bi-plus-lg')}">
</th:block>
            </div>
        </div>
    </div>
    <script>
    // Función para agregar una área del select a la lista de checkboxes
    function agregarArea() {
        const select = document.getElementById('selectarea');
        const selectedOption = select.options[select.selectedIndex];
        const listaContainer = document.getElementById('listaSeleccionadas');

        if (select.value === "") {
           return;
        }

        const areaId = select.value;
        const areaNombre = selectedOption.text;

        // Verificar si ya existe (doble seguridad)
        const checkboxes = document.querySelectorAll('input[name="areasSeleccionadas"]');
        let yaExiste = false;
        checkboxes.forEach(cb => {
            if (cb.value === areaId) yaExiste = true;
        });
        const mensaje = document.getElementById('mensajeSinAreas');
        if (mensaje) {
            mensaje.classList.add('d-none'); // Clase de Bootstrap para ocultar
        }
        if (yaExiste) {
            return;
        }

        // Crear el nuevo elemento HTML (Checkbox + Label + Botón eliminar)
        const divItem = document.createElement('div');
        divItem.className = 'd-flex align-items-center justify-content-between mb-2 p-1 border-bottom';
        
        divItem.innerHTML = `
                <div class="d-flex align-items-center">
                    <input type="checkbox" class="form-check-input me-2" value="${areaId}" data-nombre="${areaNombre}" checked >
                    <span class="text-truncate">${areaNombre}</span>
                </div>
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="eliminarArea(this, '${areaId}', '${areaNombre}')" title="Eliminar">&times;</button>
        `;

	    const inputHidden = document.createElement('input');
	    inputHidden.type = 'hidden';
	    inputHidden.name = 'areasSeleccionadas'; // ¡Mismo nombre que espera Spring!
	    inputHidden.value = areaId;
	
	    listaContainer.appendChild(divItem);
	    listaContainer.appendChild(inputHidden);

        // Deshabilitar la opción en el select para que no se pueda volver a seleccionar
        select.options[select.selectedIndex].disabled = true;
 
        // Limpiar el select
        select.value = "";
        
    }

    // Función para eliminar una área de la lista seleccionada
    function eliminarArea(btn, areaId, areaNombre) {
 
        // Encontrar el div padre y eliminarlo
        const divItem = btn.closest('.d-flex');
        if (divItem){
            const inputs = document.querySelectorAll('input[name="areasSeleccionadas"][value="' + areaId + '"]');
            inputs.forEach(input => input.remove());
        	divItem.remove();
        }
        // Re-habilitar la opción en el select
        const select = document.getElementById('selectAreasDisponibles');
        for (let i = 0; i < select.options.length; i++) {
            if (select.options[i].value === areaId) {
                select.options[i].disabled = false;
                break;
            }
        }
        const lista = document.getElementById('listaSeleccionadas');
        const items = lista.querySelectorAll('.d-flex');
        const mensaje = document.getElementById('mensajeSinAreas');
        if (items.length === 0 ){
        	mensaje.classList.remove('d-none');
        }
    }
	</script>
</div>
