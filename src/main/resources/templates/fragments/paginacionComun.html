<nav th:fragment="paginador(paginacion)" th:if="${paginacion.totalPag > 1}">
    <ul class="pagination justify-content-center">

        <!-- Primera -->
        <li class="page-item"
            th:classappend="${paginacion.first} ? ' disabled'">
            <a class="page-link"
               th:href="${paginacion.first} ? null : @{${paginacion.url}(page=0, _=${#request.parameterMap})}">
                <i class="bi bi-skip-start-fill"></i>
            </a>
        </li>

        <!-- Anterior -->
        <li class="page-item"
            th:classappend="${not paginacion.hasPrevious} ? ' disabled'">
            <a class="page-link"
               th:href="${not paginacion.hasPrevious} ? null : @{${paginacion.url}(page=${paginacion.pagActual-2}, _=${#request.parameterMap})}">
                <i class="bi bi-chevron-left"></i>
            </a>
        </li>

        <!-- Números -->
        <li class="page-item"
            th:each="elemento : ${paginacion.paginas}"
            th:classappend="${elemento.numero == paginacion.pagActual} ? ' active'">
            <a class="page-link"
               th:href="${elemento.numero == paginacion.pagActual} ? null : @{${paginacion.url}(page=${elemento.numero-1}, _=${#request.parameterMap})}"
               th:text="${elemento.numero}">
            </a>
        </li>

        <!-- Siguiente -->
        <li class="page-item"
            th:classappend="${not paginacion.hasNext} ? ' disabled'">
            <a class="page-link"
               th:href="${not paginacion.hasNext} ? null : @{${paginacion.url}(page=${paginacion.pagActual}, _=${#request.parameterMap})}">
                <i class="bi bi-chevron-right"></i>
            </a>
        </li>

        <!-- Última -->
        <li class="page-item"
            th:classappend="${paginacion.last} ? ' disabled'">
            <a class="page-link"
               th:href="${paginacion.last} ? null : @{${paginacion.url}(page=${paginacion.totalPag-1}, _=${#request.parameterMap})}">
                <i class="bi bi-skip-end-fill"></i>
            </a>
        </li>

    </ul>
</nav>
