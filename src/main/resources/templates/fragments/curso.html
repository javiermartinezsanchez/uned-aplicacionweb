<div th:fragment="fichaTecnica">
			<div class="card border border-light shadow-sm rounded-3 mt-4">
				<div class="card-header bg-light border-0 py-3">
					<h4 class="mb-0">
						<button class="btn btn-link w-100 text-start d-flex justify-content-between align-items-center text-decoration-none fw-bold p-0 text-dark" 
						        type="button" 
						        data-bs-toggle="collapse" 
						        data-bs-target="#collapseFichaTecnica" 
						        aria-expanded="false" 
						        aria-controls="#collapseFichaTecnica">
							<span th:text="#{curso.ficha.title}">Ficha técnica</span>
							<i class="bi bi-chevron-down"></i>
						</button>
					</h4>
				</div>
				<div id="collapseFichaTecnica" class="collapse">
					<div class="card-body p-4 bg-white">
						<div class="row mb-3">
							<div class="col-md-4">
								<p class="mb-2">
									<strong th:text="#{comun.fini}">Fecha inicio</strong>: <span
										th:text="${#temporals.format(curso.fIni, 'dd/MM/yyyy')}"></span>
								</p>
							</div>
							<div class="col-md-4">
								<p class="mb-2">
									<strong th:text="#{comun.fFin}">Fecha fin</strong>: <span
										th:text="${#temporals.format(curso.fFin, 'dd/MM/yyyy')}"></span>
								</p>
							</div>
							<div class="col-md-4">
								<p class="mb-2">
									<strong th:text="#{curso.nivel}">Nivel</strong>: <span
										th:text="${curso.nivel}"></span>
								</p>
							</div>
						</div>

						<div class="row">
							<div class="col-md-6">
								<p class="mb-0">
									<strong>👨‍🏫 <span th:text="#{curso.responsable}">Responsable</span>: </strong> 
									<span th:text="${curso.nombreResponsable}"></span>
								</p>
							</div>
							<div class="col-md-6">
								<p class="mb-0">
									<strong>⏱ <span th:text="#{curso.duracion}">Duración</span>: </strong> 
									<span th:text="${curso.duracion}"></span> <span th:text="#{curso.ficha.horas}">horas</span>
								</p>
							</div>
						</div>
					</div>
				</div>
			</div>
</div>
<div th:fragment="contenidosExtra">
		
			<div th:if="${not #lists.isEmpty(curso.contenidosExtra)}">
			<hr class="my-5">
				<h3 class="fw-bold mb-3" th:text="#{curso.contenidosExtra}">Contenidos extra</h3>

				<ul class="list-group">
				    <li class="list-group-item d-flex justify-content-between align-items-center" 
				        th:each="extra : ${curso.contenidosExtra}">
				        
				        <span th:text="${extra.descripcion}">Contenido extra...</span>
				        
				        <div>
				            <span sec:authorize="isAuthenticated()">
				                <a th:href="@{/contenido-extra/{idCurso}/{idConten}(idCurso=${curso.id}, idConten=${extra.id})}" 
				                   target="_blank" 
				                   class="btn btn-primary btn-sm">
				                   Ver contenido
				                </a>
				            </span>
				
				            <span sec:authorize="isAnonymous()">
				                <button class="btn btn-secondary btn-sm" disabled>
				                   🔒 Iniciar sesión
				                </button>
				            </span>
				        </div>
				    </li>
				</ul>
    </div>
</div>
<!-- fragment: valoracionCurso -->
<div th:fragment="valoracionCurso(notaMedia, totalVotos, esFormulario)" class="w-100 bg-transparent p-0 m-0">
    <div class="row align-items-center g-2 w-100">
        
        <!-- BLOQUE 1: Mostrar Media Actual (Ocupa la mitad izquierda) -->
        <div class="col-sm-6 d-flex align-items-center gap-2 text-nowrap">
            <span class="fs-4 fw-bold text-dark avg-rating-text" th:text="${#numbers.formatDecimal(notaMedia, 1, 1)}">0.0</span>
            <div class="text-warning fs-5">
                <i th:each="i : ${#numbers.sequence(1, 5)}" 
                   th:class="${i <= notaMedia} ? 'bi bi-star-fill' : (${i - 0.5 <= notaMedia} ? 'bi bi-star-half' : 'bi bi-star')"></i>
            </div>
            <span class="text-muted small" th:text="'(' + ${totalVotos} + ' valoraciones)'">(0 valoraciones)</span>
        </div>

        <!-- BLOQUE 2: Formulario para votar (Ocupa la mitad derecha y se alinea al extremo derecho) -->
        <div th:if="${esFormulario}" class="col-sm-6 d-flex align-items-center justify-content-sm-end gap-3 text-nowrap">
            <!-- Texto de pregunta -->
            <span class="small fw-semibold text-secondary rating-label">¿Qué te parece el curso?</span>
            
            <!-- Div contenedor del mensaje dinámico (Alineado en el mismo flujo) -->
            <div id="ratingFeedback" class="badge bg-success px-3 py-2 rounded-pill d-none" style="font-size: 0.85rem;"></div>

            <!-- Estrellas fijas -->
            <div class="d-inline-flex align-items-center interaction-stars" th:data-id-curso="${curso.id}">
                <i class="bi bi-star fs-5 text-warning" style="cursor: pointer;" data-value="1"></i>
                <i class="bi bi-star fs-5 text-warning" style="cursor: pointer;" data-value="2"></i>
                <i class="bi bi-star fs-5 text-warning" style="cursor: pointer;" data-value="3"></i>
                <i class="bi bi-star fs-5 text-warning" style="cursor: pointer;" data-value="4"></i>
                <i class="bi bi-star fs-5 text-warning" style="cursor: pointer;" data-value="5"></i>
            </div>
        </div>
        
    </div>
</div>
