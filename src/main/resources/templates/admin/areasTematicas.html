<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title th:text="#{comun.lista(#{areatematica.lista})}">Título</title>
</head>
<body>
<section>
	<div class="container">
		<h1 th:text="#{areatematica.lista}">Título</h1>
		<br>
		<div class="form-group">
		  <form class="row g-3 align-items-end mb-4" method="get" th:action="@{${urlBuilder.cloneBuilder().removePathExtension()}}">		
			<div class="col-md-2">
		        <label class="form-label" th:text="#{areatematica.title}">Título</label>
		        <input type="text" name="titulo" class="form-control"
		               th:value="${param.titulo}">
		    </div>
			<div class="col-md-6">
		        <label class="form-label" th:text="#{areatematica.descripcion}">Título</label>
		        <input type="text" name="descripcion" class="form-control"
		               th:value="${param.descripcion}">
		    </div>		
		    <div class="col-md-4 d-flex gap-2">
			    <div th:insert="~{fragments/botones :: btnSubmit(
			        #{command.buscar},
			        'btn-primary w-100',
			        'bi-search'
			        )}">">
				    <div th:insert="~{fragments/botones :: btnSubmit(
			        #{command.buscar},
			        'btn-primary w-100',
			        'bi-search'
			        )}">">
	            </div>
			    <div  th:replace="~{fragments/botones :: btnLink(
			        #{mensaje.nueva} + ' ' + #{areatematica.title},
			        @{${urlAlta}},
			        'btn-success', 'bi bi-plus-circle'
			        )}">
			    </div>
			     <div  th:replace="~{fragments/botones :: btnLink(
			        #{command.volver}, 
			        ${urlBack}, 
			        'btn-outline-secondary', 'bi-arrow-left'
			     )}">
			     </div>
            </div>
			    <div  th:replace="~{fragments/botones :: btnLink(
			        #{mensaje.nueva} + ' ' + #{areatematica.title},
			        @{${urlAlta}},
			        'btn-success', 'bi bi-plus-circle'
			        )}">
			    </div>
			     <div  th:replace="~{fragments/botones :: btnLink(
			        #{command.volver}, 
			        ${urlBack}, 
			        'btn-outline-secondary', 'bi-arrow-left'
			     )}">
			     </div>
		    </div>
          </form>
        </div>   
		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th th:text="#{areatematica.title}">default</th>
					<th th:text="#{areatematica.descripcion}">default</th>
					<th th:text="#{curso.lista}"></th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="tema : ${paginacion.contenido}">
					<td th:text="${tema.titulo}">ID</td>
					<td th:text="${tema.descripcion}">ID</td>
					<td th:text="${tema.numCursos}">ID</td>
					<td><a th:href="@{|${url}/${tema.id}|}" class="btn btn-primary" ><i class="bi bi-pencil-square"></i></a></td>
				</tr>
			</tbody>
		</table>
        <div th:replace="~{fragments/paginacionComun :: paginador(${paginacion}, '')}"></div>
	</div>
</section>
</body>
</html>
