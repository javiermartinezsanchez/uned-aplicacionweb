<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title>Usuarios</title>
</head>
<body>
<section>
	<div class="container">
		<div class="d-flex justify-content-between align-items-center mb-4">
	        <h1 class="mb-0" th:text="#{comun.lista(#{usuario.accesos})}">Título</h1>
	        <div class="d-flex gap-2">
	            <a th:replace="~{fragments/botones :: btnVolver(${urlBack})}"></a>
	        </div>
	    </div>
		<form th:action="@{/admin/accesos}" method="get" class="row g-2 mb-3 align-items-end">
		
		    <div class="col-auto">
		        <label for="fechaIni" class="form-label mb-0" th:text="#{comun.fini}">Fecha Inicial</label>
		        <input type="date"
		               id="fechaIni"
		               name="fechaIni"
		               class="form-control"
		               th:value="${paramsBusqueda.get('fechaIni')}">
		    </div>
		
		    <div class="col-auto">
		        <label for="fechaFin" class="form-label mb-0" th:text="#{comun.fFin}">Fecha Final</label>
		        <input type="date"
		               id="fechaFin"
		               name="fechaFin"
		               class="form-control"
		               th:value="${paramsBusqueda.get('fechaFin')}">
		    </div>
		
		    <div class="col-auto">
		        <boton th:replace="~{fragments/botones :: btnSubmit(#{command.buscar}, 'btn-primary', 'bi-search')}"/>
		    </div>
		    <div class="col-auto">
		    <a th:replace="~{fragments/botones :: btnLink(
     			 #{admin.grafico.accesos} ,
	       		 @{/admin/auditoria},
	        	'btn-dark', 'bi-bar-chart-fill me-2'
                )}">
            </a>
		    </div>
		</form>
		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th th:text="#{usuario.email}">default</th>
					<th th:text="#{acceso.mensaje}">default</th>
					<th th:text="#{acceso.fecha}">default</th>
					
				</tr>
			</thead>
			<tbody>
				<tr th:each="acceso : ${paginacion.contenido}">
					<td th:text="${acceso.nombreUsuario}">ID</td>
					<td th:text="${acceso.mensaje}">ID</td>
					<td th:text="${#temporals.format(acceso.fechaAudit, 'dd/MM/yyyy HH:mm:ss')}"></span>
					
				</tr>
			</tbody>
		</table>
		
     <div th:replace="~{fragments/paginacionComun :: paginador(${paginacion}, '')}"></div>
		
	</div>
</section>
</body>
</html>
