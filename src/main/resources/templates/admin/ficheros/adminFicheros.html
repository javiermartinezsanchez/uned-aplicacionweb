<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title th:text="#{panel.admdisco}">Título</title>
</head>
<body>
<section>
	<div class="container">
		<h1 th:text="#{panel.admdisco}">Título</h1>
		<br>
		<div th:replace="~{fragments/mensajesresultado :: mensajes}"></div>
		<div class="form-group">
		    <form class="row g-3 mb-4 align-items-end" method="get" th:action="@{${urlBuilder.cloneBuilder().removePathExtension()}}">		
		        <div class="col-md-3">
		            <label class="form-label" th:text="#{comun.nombre('')}">Título</label>
		            <input type="text" name="nombreReal" class="form-control" th:value="${param.nombreReal}">
		        </div>
				<div class="col-md-3">
				<label class="form-label" th:text="#{mantenimiento.tabla.tipo}">traducir</label>
					<select class="form-select" name="TipoFichero">
						<option th:value="${''}" th:text="#{comun.select.any}"></option>
    					<option th:each="val : ${T(es.alumno.uned.model.entities.TipoFichero).values()}" 
            				th:value="${val}" 
            				th:text="${val}">
    					</option>
					</select>    
				</div>	    
		        <div class="col-md-2 d-flex align-items-end" th:insert="~{fragments/botones :: btnSubmit(
		            #{command.buscar},
		            'btn-primary w-100',
		            'bi-search'
		            )}">
		        </div>
		        
		        <div class="col-auto">
		            <div th:replace="~{fragments/botones :: btnLink(
		                #{command.volver}, 
		                ${urlBack}, 
		                'btn-outline-secondary', 
		                'bi-arrow-left'
		            )}">
		            </div>
		        </div>
		    </form>
		</div>
		<table class="table table-striped table-bordered">
					<thead class="table-dark">
						<tr>
							<th th:text="#{mantenimiento.tabla.nombre}">Nombre Fichero</th>
							<th th:text="#{mantenimiento.tabla.tamano}">Tamaño</th>
							<th th:text="#{mantenimiento.tabla.tipo}">Tipo Fichero</th>
							<th th:text="#{mantenimiento.tabla.huerfano}">Huérfano</th>
							<th></th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="file : ${paginacion.contenido}">
		    <td class="text-truncate" style="max-width: 250px;" th:text="${file?.nombreReal()}">UUID.pdf</td>
		    <td class="text-end" th:text="${file?.sizeKB()}">140 KB</td>
		    <td>
		        <span th:if="${file?.tipoFichero()?.name() == 'DOCUMENTO'}" class="badge bg-info-subtle text-info-emphasis border border-info-subtle">
		            <i class="bi bi-file-earmark-pdf-fill"></i><span th:text="#{mantenimiento.tipo.documento}">Documento</span>
		        </span>
		        <span th:if="${file?.tipoFichero()?.name() == 'IMAGEN'}" class="badge bg-warning-subtle text-warning-emphasis border border-warning-subtle">
		            <i class="bi bi-image"></i> <span th:text="#{mantenimiento.tipo.imagen}"></span>
		        </span>
		    </td>
		    <td>
		        <span th:if="${file?.esHuerfano}" class="badge bg-danger-subtle text-danger-emphasis border border-danger-subtle"><i class="bi bi-exclamation-triangle-fill"></i> <span th:text="#{mantenimiento.estado.huerfano}">Huérfano</span></span>
		        <span th:unless="${file?.esHuerfano}" class="badge bg-success-subtle text-success-emphasis border border-success-subtle"><i class="bi bi-check-circle-fill"></i>  <span th:text="#{mantenimiento.estado.enuso}">Huérfano</span></span>
		    </td>
		    <td class="text-center">
		        <form th:if="${file?.esHuerfano}" th:action="@{${url}}" method="post" class="m-0">
		            <input type="hidden" name="nombreArchivo" th:value="${file?.nombre}" />
		            <input type="hidden" name="tipoFichero" th:value="${file?.tipoFichero()?.name()}" />
		            
		            <button type="submit" class="btn btn-outline-danger btn-sm border-0">
		                <i class="bi bi-check-circle-fill"></i>
		            </button>
		        </form>
		        <button th:unless="${file?.esHuerfano}" class="btn btn-sm btn-light border-0" disabled>
		            <i class="bi bi-shield-lock-fill text-muted"></i>
		        </button>
		    </td>
		</tr>
				
			</tbody>
		</table>
        <div th:replace="~{fragments/paginacionComun :: paginador(${paginacion}, '')}"></div>
	</div>
</section>
</body>
</html>
