<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title th:text="#{usuario.lista}">Título</title>
</head>
<body>
<section>
	<div class="container">
		<h1 th:text="#{comun.lista(#{usuarios.conectados})}">Listado</h1>
		   <div class="col-auto">
		   		    <div  th:replace="~{fragments/botones :: btnLink(
		        #{command.volver}, 
		        ${urlBack}, 
		        'btn-outline-secondary', 'bi-arrow-left'
		    )}">
		   
		   </div>
		</div>   
		<br>
		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th th:text="#{usuario.email}">default</th>
					<th th:text="#{usuario.lastactivity}"></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="usuario : ${usuarios}">
					<td th:utext="${usuario.usuario}">ID</td>
		 			<td th:utext="${#dates.format(usuario.lastRequest, 'dd/MM/yyyy HH:mm:ss')}">ID</td>
				</tr>
			</tbody>
		</table>
	</div>
</section>
</body>
</html>
