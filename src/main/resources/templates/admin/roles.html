<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title>Usuarios</title>
</head>
<body>
<section>
	<div class="container">
		<h1 th:text="#{comun.lista(#{rol.list})}">traducir</h1>
		<br>
		<div th:replace="fragments/botones ::btnLink(#{command.volver}, ${urlBack}, 'btn-outline-secondary', 'bi-arrow-left')"></div>
		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th th:text="#{usuario.role}">default</th>
					<th th:text="#{comun.descripcion}">default</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="linea : ${lista}">
					<td th:text="${linea.nombre}">ID</td>
					<td th:text="${linea.descripcion}">ID</td>
				</tr>
			</tbody>
		</table>
	</div>
</section>
</body>
</html>
