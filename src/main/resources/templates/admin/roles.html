<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title>Usuarios</title>
</head>
<body>
<section>
	<div class="container">
		<div class="d-flex justify-content-between align-items-center mb-4">
	        <h1 class="mb-0" th:text="#{comun.lista(#{rol.list})}">Título</h1>
	        <div class="d-flex gap-2">
	            <a th:replace="~{fragments/botones :: btnVolver(${urlBack})}"></a>
	        </div>
	    </div>
		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th th:text="#{usuario.role}">default</th>
					<th th:text="#{comun.descripcion}">default</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="linea : ${lista}">
					<td th:text="${linea.nombre}">ID</td>
					<td th:text="${linea.descripcion}">ID</td>
				</tr>
			</tbody>
		</table>
	</div>
</section>
</body>
</html>
