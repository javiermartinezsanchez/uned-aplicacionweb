<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
th:replace="~{plantilla::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<section>
<form th:action="@{/estudiantes/miperfil}" th:object="${form}" method="post">

    <h5 class="mt-4">Datos del Estudiante</h5>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" th:field="*{email}" class="form-control">
        <div class="text-danger" th:errors="*{email}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" th:field="*{nombre}" class="form-control">
        <div class="text-danger" th:errors="*{nombre}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Apellido1</label>
        <input type="text" th:field="*{apellido1}" class="form-control">
        <div class="text-danger" th:errors="*{apellido1}"></div>
    </div>
   <div class="mb-3">
        <label class="form-label">Apellido2</label>
        <input type="text" th:field="*{apellido2}" class="form-control">
        <div class="text-danger" th:errors="*{apellido2}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Dirección</label>
        <input type="text" th:field="*{direccion}" class="form-control">
        <div class="text-danger" th:errors="*{direccion}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Población</label>
        <input type="text" th:field="*{poblacion}" class="form-control">
        <div class="text-danger" th:errors="*{poblacion}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Provincia</label>
        <input type="text" th:field="*{provincia}" class="form-control">
        <div class="text-danger" th:errors="*{provincia}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Código Postal</label>
        <input type="text" th:field="*{codPostal}" class="form-control">
        <div class="text-danger" th:errors="*{codPostal}"></div>
    </div>

    <button type="submit" class="btn btn-primary">Guardar cambios</button>
</form>
</section>
</body>
</html>
