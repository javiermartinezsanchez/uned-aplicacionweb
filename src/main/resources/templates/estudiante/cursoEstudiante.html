<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}">
<head>
<meta charset="utf-8">
<title th:text="#{curso.lista}">Título</title>
</head>
<body>
	<section>
		<div class="container py-5" th:object="${curso}">

			<div class="row mb-4">
				<div class="col-md-5">
					<img th:src="@{/images/curso/{img}(img=*{uriImagen})}"
						class="img-fluid rounded shadow-sm" alt="Imagen del curso">
				</div>

				<div class="col-md-7 d-flex flex-column justify-content-between">
					<div>
						<h1 class="fw-bold" th:text="*{titulo}">Título del curso</h1>
						<p class="text-muted fs-5" th:text="*{descripcion}">Descripción del curso...</p>
					</div>
					<div th:insert="~{fragments/curso-card ::infocursoEstudiante}"
					th:with="yaInscrito=true, 
						              progresoCurso=${curso.progreso}, 
						              estadoCurso=${curso.estado}"></div>
					
					<div class="mt-2">
						<span class="fw-semibold text-secondary fs-6"> 👥 <span
							th:text="*{usuariosRegistrados}">0</span> <span
							th:text="#{curso.inscritos}">inscritos</span>
						</span>
					</div>
			        <div class="row mt-4">
			            <div class="col-12">
			                <div th:replace="~{fragments/curso :: valoracionCurso(${curso.valoracion}, ${curso.numValoraciones}, true)}"></div>
			            </div>
			        </div>
				</div>
			</div>

			<hr class="my-5">

			<h3 class="fw-bold mb-3" th:text="#{curso.modulos}">Módulos del curso</h3>

			<div th:if="${curso.modulos != null}">
				<div class="accordion" id="modulosAccordion">

					<div class="accordion-item mb-2" th:each="modulo, i : ${curso.modulos}" 
					     th:with="esExpandido=${modulo.estado?.name() == 'ACTIVO' or modulo.estado?.name() == 'REVISADO' or modulo.estado?.name() == 'PENDIENTE_REVISION'}">

						<h2 class="accordion-header" th:id="'modulo-' + ${i.index}">
							<button th:class="'accordion-button ' + (${esExpandido} ? '' : 'collapsed')" 
							        type="button"
							        data-bs-toggle="collapse"
							        th:data-bs-target="'#collapse-' + ${i.index}"
							        th:aria-expanded="${esExpandido} ? 'true' : 'false'"
							        th:aria-controls="'collapse-' + ${i.index}">
								<span class="fw-bold" th:text="${modulo.titulo}">Operativa de la plataforma</span> 
							</button>
						</h2>

						<div th:id="'collapse-' + ${i.index}"
						     th:class="'accordion-collapse collapse ' + (${esExpandido} ? 'show' : '')"
						     th:aria-labelledby="'modulo-' + ${i.index}"
						     data-bs-parent="#modulosAccordion">

							<div class="accordion-body">
								<p class="text-muted" th:text="${modulo.titulo}">Operativa</p>

								<div class="mt-3" th:if="${modulo.contenido != null}">
									<strong th:text="#{curso.modulo.contenido}">Contenido:</strong>
									<pre class="bg-light p-3 rounded mt-2 text-dark border-0 text-break" 
										 style="white-space: pre-line; font-family: var(--bs-body-font-family); line-height: 1.6; font-size: 0.95rem;"
										 th:text="${modulo.contenido}"></pre>
								</div>

								<div class="border-top pt-3 mt-3">
								    
								    <div th:if="${modulo.estado?.name() == 'COMPLETADO'}" class="text-success small fw-semibold">
								        <i class="bi bi-check-circle-fill me-1"></i> Completado el 
								        <span th:text="${#temporals.format(modulo.fechaCompletado, 'dd/MM/yyyy HH:mm')}">23/05/2026</span>
								    </div>
								    <div th:if="${modulo.estado?.name() == 'PENDIENTE_REVISION'}" class="text-warning small fw-semibold d-flex align-items-center gap-2">
								        <i class="bi bi-eye me-1"></i> Enviado el  
								        <span th:text="${#temporals.format(modulo.fechaEntrega, 'dd/MM/yyyy HH:mm')}">23/05/2026</span>
										<th:block th:replace="~{fragments/botones :: btnLinkTarget(
										#{modulo.verEntrega}, 
										@{|/estudiante/curso/${modulo.cursoId}/modulo/${modulo.moduloId}/verEntrega|}, 
										false, 
										'_blank', 
										'btn-outline-warning btn-sm px-2 text-nowrap', 
										'bi-file-earmark-arrow-down-fill me-1')}"></th:block>
								    </div>
								
								    <div th:if="${modulo.estado?.name() == 'ACTIVO'}" th:switch="${modulo.tipoModulo?.name()}">
								        <form th:action="@{/estudiante/modulo/completar}" method="POST" enctype="multipart/form-data" class="row g-2 align-items-center">
								                <input type="hidden" name="idCurso" th:value="${modulo.cursoId}" />
								                <input type="hidden" name="idModulo" th:value="${modulo.moduloId}" />
								                <input type="hidden" name="tipoModulo" th:value="${modulo.tipoModulo}"/>
								       
								        <div th:case="'FINALIZACION_MANUAL'">
								                 <button type="submit" class="btn btn-success btn-sm">
								                    <i class="bi bi-bookmark-check-fill me-1"></i> COMPLETAR MÓDULO
								                </button>
								        </div>
								
								        <div th:case="'ENTREGA_OBLIGATORIA'">
								                 
								                <div class="col-sm-8 col-md-6">
								                    <label class="form-label small text-muted mb-1 fw-medium">Adjuntar tarea obligatoria:</label>
								                    <input type="file" name="ficheroTarea" class="form-control form-control-sm" required />
								                </div>
								                <div class="col-sm-4 col-md-3 align-self-end" 
								                th:insert="~{fragments/botones :: btnSubmit(#{modulo.enviarEntrega},'btn-primary btn-sm w-100','bi-file-earmark-arrow-up-fill me-1')}">
								                </div>
								           
								        </div>
								        </form> 
								    </div>
								</div>

							</div>
						</div>

					</div>
				</div>
			</div>

			<hr class="my-5">

<!-- 			<div th:if="${not #lists.isEmpty(curso.curso.contenidosExtra)}"> -->
<!-- 				<h3 class="fw-bold mb-3" th:text="#{curso.contenidosExtra}">Contenidos extra</h3> -->

<!-- 								   target="_blank"  -->
<!-- 								   class="btn btn-primary btn-sm"> -->
<!-- 								   Ver contenido -->
<!-- 								</a> -->

<!-- 								<button class="btn btn-secondary btn-sm" disabled> -->
<!-- 								   🔒 Iniciar sesión -->
<!-- 								</button> -->
<!-- 							</span> -->
<!-- 						</div> -->
<!-- 					</li> -->
<!-- 				</ul> -->
<!-- 			</div> -->

				<div th:insert="~{fragments/curso ::fichaTecnica}"></div>

		</div>
		<script th:src="@{/js/enviarvaloracion.js}"></script>
	</section>
</body>
</html>
