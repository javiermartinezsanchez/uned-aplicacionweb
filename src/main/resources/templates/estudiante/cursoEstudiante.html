<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}">
<head>
<meta charset="utf-8">
<title th:text="#{curso.lista}">Título</title>
</head>
<body>
	<section>
		<div class="container py-5" th:object="${curso}">
          <th:block th:replace="~{fragments/cursofragments :: cabeceraCurso(true)}"></th:block>

			<hr class="my-5">

			<h3 class="fw-bold mb-3" th:text="#{curso.modulos}">Módulos del curso</h3>

			<div th:if="${curso.modulos != null}">
				<div class="accordion" id="modulosAccordion">

					<div class="accordion-item mb-2" th:each="modulo, i : ${curso.modulos}" 
					     th:with="esExpandido=${modulo.estado?.name() == 'ACTIVO' or modulo.estado?.name() == 'REVISADO' or modulo.estado?.name() == 'PENDIENTE_REVISION'}">

						<h2 class="accordion-header" th:id="'modulo-' + ${i.index}">
							<button th:class="'accordion-button ' + (${esExpandido} ? '' : 'collapsed')" 
							        type="button"
							        data-bs-toggle="collapse"
							        th:data-bs-target="'#collapse-' + ${i.index}"
							        th:aria-expanded="${esExpandido} ? 'true' : 'false'"
							        th:aria-controls="'collapse-' + ${i.index}">
								<span th:switch="${modulo.estado?.name()}" class="me-3 fs-5 d-inline-flex align-items-center">
						            <i th:case="'ACTIVO'" class="bi bi-play-circle-fill text-info" title="En curso"></i>
						            <i th:case="'PENDIENTE_REVISION'" class="bi bi-hourglass-split text-warning" title="Esperando revisión"></i>
						            <i th:case="'REVISADO'" class="bi bi-eye-fill text-primary" title="Revisado"></i>
						            <i th:case="'COMPLETADO'" class="bi bi-check-circle-fill text-success" title="Completado"></i>
						            <i th:case="*" class="bi bi-circle text-muted"></i>
						        </span>
								<span class="fw-bold" th:text="${modulo.titulo}">Operativa de la plataforma</span> 
							</button>
						</h2>

						<div th:id="'collapse-' + ${i.index}"
						     th:class="'accordion-collapse collapse ' + (${esExpandido} ? 'show' : '')"
						     th:aria-labelledby="'modulo-' + ${i.index}"
						     data-bs-parent="#modulosAccordion">

							<div class="accordion-body">
								<p class="text-muted" th:text="${modulo.titulo}">Operativa</p>

								<div class="mt-3" th:if="${modulo.contenido != null}">
									<strong th:text="#{curso.modulo.contenido}">Contenido:</strong>
									<pre class="bg-light p-3 rounded mt-2 text-dark border-0 text-break" 
										 style="white-space: pre-line; font-family: var(--bs-body-font-family); line-height: 1.6; font-size: 0.95rem;"
										 th:text="${modulo.contenido}"></pre>
								</div>

								<div class="border-top pt-3 mt-3">
								    <th:block th:if="${modulo.estado?.name() == 'COMPLETADO'}">
								    <div  class="text-success small fw-semibold">
								        
										<th:block th:replace="~{fragments/cursofragments :: entregarevision}"></th:block>
								        <i class="bi bi-check-circle-fill me-1"></i> Completado el <span th:text="${#temporals.format(modulo.fechaCompletado, 'dd/MM/yyyy HH:mm')}">23/05/2026</span>
								    </div>
 									</th:block>
 									<th:block th:unless="${modulo.estado?.name() == 'COMPLETADO'}">
 									<div  th:replace="~{fragments/cursofragments :: entregarevision}"></div>
								    </th:block>
								    <div th:if="${modulo.estado?.name() == 'ACTIVO'}" th:switch="${modulo.tipoModulo?.name()}">
								        <form th:action="@{/estudiante/modulo/completar}" method="POST" enctype="multipart/form-data" class="row g-2 align-items-center">
								                <input type="hidden" name="idCurso" th:value="${modulo.cursoId}" />
								                <input type="hidden" name="idModulo" th:value="${modulo.moduloId}" />
								                <input type="hidden" name="tipoModulo" th:value="${modulo.tipoModulo}"/>
								       
								        <div th:case="'FINALIZACION_MANUAL'">
								                 <button th:replace="~{fragments/botones :: btnSubmit(#{curso.modulo.marcarCompletado},'btn-outline-success btn-sm','bi-check-circle-fill me-2')}">
								                </button>
								        </div>
								
								        <div th:case="'ENTREGA_OBLIGATORIA'">
								                 
								                <div class="col-sm-8 col-md-6">
								                    <label class="form-label small text-muted mb-1 fw-medium">Adjuntar tarea obligatoria:</label>
								                    <input type="file" name="ficheroTarea" class="form-control form-control-sm" required />
								                </div>
								                <div class="col-sm-4 col-md-3 align-self-end" 
								                th:insert="~{fragments/botones :: btnSubmit(#{modulo.enviarEntrega},'btn-primary btn-sm w-100','bi-file-earmark-arrow-up-fill me-1')}">
								                </div>
								           
								        </div>
								        </form> 
								    </div>
								</div>

							</div>
						</div>

					</div>
				</div>
			</div>

			<hr class="my-5">
			<th:block th:replace="~{fragments/cursofragments :: contenidosExtra}"></th:block>
			<div th:insert="~{fragments/cursofragments ::fichaTecnica}"></div>
		</div>
		<script th:src="@{/js/enviarvaloracion.js}"></script>
	</section>
</body>
</html>
