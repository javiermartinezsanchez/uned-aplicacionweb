<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title th:text="#{usuario.lista}">Título</title>
</head>
<body>
<section>
	<div class="container">
		<div class="d-flex justify-content-between align-items-center mb-4">
	        <h1 class="mb-0" th:text="#{comun.lista(#{estudiante.lista})}">Título</h1>
	        
	        <div class="d-flex gap-2">
	            <a th:replace="~{fragments/botones :: btnLink(
	     			 #{mensaje.nuevo} + ' ' + #{estudiante.titulo},
		       		 @{${urlAlta}},
		        	'btn-success', 'bi bi-plus-circle'
	                )}">
	            </a>
	            <a th:replace="~{fragments/botones :: btnVolver(${urlBack})}"></a>
	        </div>
	    </div>
		<div class="form-group">
			<form class="row g-3 align-items-end mb-4" method="get" th:action="@{${urlBuilder.cloneBuilder().removePathExtension()}}">
			    <div class="col-md-3">
			        <label class="form-label" th:text="#{comun.nombre('')}">TRADUCIR</label>
			        <input type="text" name="nombre" class="form-control"
			               th:value="${paramsBusqueda['nombre']}">
				</div>
		    	<div class="col-md-3">
			        <label class="form-label" >E-mail</label>
			        <input type="text" name="email" class="form-control"
			               th:value="${paramsBusqueda['email']}">
				</div>
			    <div class="col-md-2" th:insert="~{fragments/botones :: btnSubmit(
				        #{command.buscar},
				        'btn-primary',
				        'bi-search'
				    )}">">
		    	</div>
			</form>
		</div>
		<table class="table table-striped table-bordered">
			<thead class="table-dark">
        <tr>
            
            <th th:text="#{comun.nombre('')}">Nombre completo</th>
            <th>Email</th>
            <th th:text="#{usuario.poblacion}">Población</th>
            <th th:text="#{usuario.provincia}">Provincia</th>
            <th></th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="e : ${paginacion.contenido}">
            
            <td th:text="${e.nombre + ' ' + e.apellido1}"></td>
            <td th:text="${e.email}"></td>
            <td th:text="${e.poblacion}"></td>
            <td th:text="${e.provincia}"></td>
			<td><a th:href="@{/estudiante/editar/{id}(id=${e.id})}" class="btn btn-primary" ><i class="bi bi-pencil-square"></i></a></td>
        </tr>
    </tbody>
</table>
     	<div th:replace="~{fragments/paginacionComun :: paginador(${paginacion}, '')}"></div>
	</div>
</section>
</body>
</html>
