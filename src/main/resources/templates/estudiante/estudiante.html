<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Estudiante</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>Registro de Estudiante</h4>
        </div>

        <div class="card-body">

            <form th:action="@{/estudiantes/registrar}"
                  th:object="${form}"
                  method="post">

                <!-- DATOS DEL USUARIO -->
                <h5 class="mt-3">Datos del Usuario</h5>

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control">
                    <div class="text-danger" th:errors="*{nombre}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Apellidos</label>
                    <input type="text" th:field="*{apellidos}" class="form-control">
                    <div class="text-danger" th:errors="*{apellidos}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control">
                    <div class="text-danger" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" th:field="*{password}" class="form-control">
                    <div class="text-danger" th:errors="*{password}"></div>
                </div>

                <!-- DATOS DEL ESTUDIANTE -->
                <h5 class="mt-4">Datos del Estudiante</h5>

                <div class="mb-3">
                    <label class="form-label">Dirección</label>
                    <input type="text" th:field="*{direccion}" class="form-control">
                    <div class="text-danger" th:errors="*{direccion}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Población</label>
                    <input type="text" th:field="*{poblacion}" class="form-control">
                    <div class="text-danger" th:errors="*{poblacion}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Provincia</label>
                    <input type="text" th:field="*{provincia}" class="form-control">
                    <div class="text-danger" th:errors="*{provincia}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Código Postal</label>
                    <input type="text" th:field="*{codPostal}" class="form-control">
                    <div class="text-danger" th:errors="*{codPostal}"></div>
                </div>

                <button type="submit" class="btn btn-success mt-3">Registrar</button>

            </form>

        </div>
    </div>
</div>

</body>
</html>
