<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}">
<head>
<meta charset="utf-8">
<title th:text="#{curso.lista}">Título</title>
</head>
<body>
	<section>
	<div class="container py-5" th:object="${curso}">
	<th:block th:replace="~{fragments/cursofragments :: cabeceraCurso(false)}"></th:block>
	<hr class="my-5">
	<table class="table table-striped table-bordered">
		<thead class="table-dark">
			<tr>
				<th th:text="#{estudiante.titulo}">default</th>	
				<th th:text="#{curso.progreso}"></th>
				<th></th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="curso : ${paginacion.contenido}">
				<td class="text-truncate" style="max-width: 350px;" th:text="${curso.estudiante.nombreCompleto}" th:title="${curso.estudiante.nombreCompleto}">ID</td>
				<td ><div th:insert="~{fragments/cursofragments ::infocursoEstudiante}"
					th:with="yaInscrito=true, 
						              progresoCurso=${curso.progreso}, 
						              estadoCurso=${curso.estado},
						              isFicha=true"></div>
				</td>
				<td></td>
			</tr>
		</tbody>
	</table>
    <div th:replace="~{fragments/paginacionComun :: paginador(${paginacion}, '')}"></div>
    </div>
</section>
</body>
</html>
