<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}">
<head>
<meta charset="utf-8">
<title th:text="#{curso.lista}">Título</title>
</head>
<body>
	<section>
		<div class="container py-5" th:object="${curso}">

			<div class="row mb-4">
				<div class="col-md-5">
					<img th:src="${curso.uriImagen != null and !#strings.isEmpty(curso.uriImagen)} ? (@{|/images/${#strings.length(curso.uriImagen) > 36 and #strings.contains(curso.uriImagen, '-') ? 'curso/' : ''}${curso.uriImagen}|}) : @{/images/default-curso.png}" class="img-fluid rounded shadow-sm" alt="Imagen del curso">
				</div>

				<div class="col-md-7 d-flex flex-column justify-content-between">
					<div>
						<h1 class="fw-bold" th:text="*{titulo}">Título del curso</h1>
						<p class="text-muted fs-5" th:text="*{descripcion}">Descripción del curso...</p>
					</div>
					<div>
						<strong>👨‍🏫 <span th:text="#{estudiante.titulo}">texto</span>: </strong> 
						<span th:text="${curso.estudiante.nombreCompleto}"></span>
				  	</div>
					<div>
						<strong>⏱ <span th:text="#{curso.fechacomienzo}">Duración</span>: </strong> 
						<span th:text="${#temporals.format(curso.fechaSubscripcion, 'dd/MM/yyyy HH:mm')}">23/05/2026</span>
					</div>
				</div>

			</div>

			<hr class="my-5">
			<h3 class="fw-bold mb-3" th:text="#{curso.esperando.revision}">Módulos del curso</h3>

			<div th:if="${curso.modulos != null}">
				<div class="accordion" id="modulosAccordion">

					<div class="accordion-item mb-2" th:each="modulo, i : ${curso.modulos}" 
					     th:with="esExpandido=${modulo.estado?.name() == 'PENDIENTE_REVISION'}">

						<h2 class="accordion-header" th:id="'modulo-' + ${i.index}">
							<button th:class="'accordion-button ' + (${esExpandido} ? '' : 'collapsed')" 
							        type="button"
							        data-bs-toggle="collapse"
							        th:data-bs-target="'#collapse-' + ${i.index}"
							        th:aria-expanded="${esExpandido} ? 'true' : 'false'"
							        th:aria-controls="'collapse-' + ${i.index}">
								<span class="fw-bold" th:text="${modulo.titulo}">Operativa de la plataforma</span> 
							</button>
						</h2>

						<div th:id="'collapse-' + ${i.index}"
						     th:class="'accordion-collapse collapse ' + (${esExpandido} ? 'show' : '')"
						     th:aria-labelledby="'modulo-' + ${i.index}"
						     data-bs-parent="#modulosAccordion">


								<div class="mt-3" th:if="${modulo.contenido != null}">
									<strong th:text="#{curso.modulo.contenido}">Contenido:</strong>
									<pre class="bg-light p-3 rounded mt-2 text-dark border-0 text-break" 
										 style="white-space: pre-line; font-family: var(--bs-body-font-family); line-height: 1.6; font-size: 0.95rem;"
										 th:text="${modulo.contenido}"></pre>
								</div>

								<div class="border-top pt-3 mt-3">
								    
								    <div th:if="${modulo.estado?.name() == 'PENDIENTE_REVISION'}" class="text-warning small fw-semibold d-flex align-items-center gap-2">
								        <i class="bi bi-eye me-1"></i> <span th:text="#{curso.modulo.fechaEntrega}"></span> 
								        <span th:text="${#temporals.format(modulo.fechaEntrega, 'dd/MM/yyyy HH:mm')}">23/05/2026</span>
										<th:block th:replace="~{fragments/botones :: btnLinkTarget(
										#{modulo.verEntrega}, 
										@{|/profesor/${curso.estudiante.id}/curso/${modulo.cursoId}/modulo/${modulo.moduloId}/verEntrega|}, 
										false, 
										'_blank', 
										'btn-outline-warning btn-sm px-2 text-nowrap', 
										'bi-file-earmark-arrow-down-fill me-1')}"></th:block>
								    </div>
								
								    <div class="row g-3 align-items-end mb-1">
										<form th:action="@{/profesor/cursorevisado}" method="POST" class="p-3 bg-light rounded shadow-sm">
										    
										    <!-- 1. Datos de control inyectados DENTRO del objeto modulo (índice 0) -->
										    <input type="hidden" name="modulos[0].estudianteId" th:value="${curso.estudiante.id}"/>
										    <input type="hidden" name="modulos[0].cursoId" th:value="${curso.curso.id}"/>
										    <input type="hidden" name="modulos[0].moduloId" th:value="${modulo.moduloId}"/>
										    
										    <!-- FILA SUPERIOR: Campos de entrada -->
										    <div class="row g-3 mb-3">
										        <!-- Calificación -->
										        <div class="col-sm-3 col-md-2">
										            <label class="form-label fw-bold" th:text="#{curso.modulo.calificacion}">Calificación</label>
										            <input type="number" 
										                   min="1" 
										                   max="10" 
										                   step="0.01" 
										                   class="form-control text-center" 
										                   style="max-width: 9ch;" 
										                   name="modulos[0].calificacion" 
										                   th:value="${modulo.calificacion}">
										        </div>
										        
										        <!-- Notas / Descripción -->
										        <div class="col-sm-9 col-md-10">
										            <label class="form-label fw-bold" th:text="#{curso.modulo.notascalificacion}">Notas calificación</label>
										            <textarea class="form-control" 
										                      name="modulos[0].notasCalificacion" 
										                      rows="2" 
										                      th:text="${modulo.notasCalificacion}"></textarea>
										        </div>
										    </div>
										    <div class="row">
										        <div class="col-12 d-flex justify-content-end gap-2 border-top pt-2">
										            <div th:replace="~{fragments/botones :: btnGroup(#{command.save}, #{command.cancel}, ${urlCancel})}"></div>
										        </div>
										    </div>
										    
										</form>

								    </div>
								</div>
						</div>
					</div>
				</div>
			</div>
			<hr class="my-5">
		</div>
	</section>
</body>
</html>
