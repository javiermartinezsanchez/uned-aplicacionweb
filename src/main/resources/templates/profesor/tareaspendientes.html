<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title th:text="#{curso.lista}">Título</title>
</head>
<body>
<section>
 <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0" th:text="#{panel.profesor.tareas}">Título</h1>
        
        <div class="d-flex gap-2">
            <a th:replace="~{fragments/botones :: btnVolver(${urlBack})}"></a>
        </div>
    </div>
	<div th:if="${paginacion.contenido.empty}" class="alert alert-success d-flex align-items-center th-shadow-sm" role="alert">
	    <!-- El ícono verde de éxito indica que todo está corregido -->
	    <i class="bi bi-check-circle-fill me-2 fs-4 text-success"></i>
	    <div>
	        <strong th:text="#{panel.profesor.tareas}">Tareas</strong>: ¡Buen trabajo! No tienes tareas pendientes de corrección en este momento.
	    </div>
	</div>

<!-- 2. TABLA: Solo se renderiza si SÍ existen tareas pendientes -->
<div th:unless="${paginacion.contenido.empty}" class="table-responsive shadow-sm rounded">
	
	<table class="table table-striped table-bordered">
		<thead class="table-dark">
			<tr>
				<th th:text="#{curso.titulo}">default</th>
				<th th:text="#{modulo.title}">default</th>
				<th th:text="#{estudiante.titulo}">default</th>
				<th th:text="#{modulo.fechaEntrega}">default</th>
				<th th:text="#{modulo.revisar}">default</th>
				<th></th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="ec : ${paginacion.contenido}">
				<td> 
					<th:block th:if="${ec.curso.uriImagen} != null and ${ec.curso.uriImagen} != ''">
						<img th:src="${ec.curso.uriImagen != null and !#strings.isEmpty(ec.curso.uriImagen)} ? (@{|/images/${#strings.length(ec.curso.uriImagen) > 36 and #strings.contains(ec.curso.uriImagen, '-') ? 'curso/' : ''}${ec.curso.uriImagen}|}) : @{/images/default-curso.png}" class="img-thumbnail" style="width: 40px; height: 40px; object-fit: cover; vertical-align: middle; margin-right: 8px;" alt="Imagen del curso">
	
		            </th:block>
				<span th:text="${ec.curso.titulo}">ID</span>
				</td>
				<td class="align-middle fw-semibold" th:text="${ec.estudiante.nombreCompleto}">
        			estudiante
    			</td>
    			   <td class="align-middle">
        <span th:if="${not #lists.isEmpty(ec.modulos)}" th:text="${ec.modulos[0].titulo}">
            nombre modulo
        </span>
    </td>
	<td class="align-middle text-muted">
        <span th:if="${not #lists.isEmpty(ec.modulos)}" 
              th:text="${#temporals.format(ec.modulos[0].fechaEntrega, 'dd/MM/yyyy HH:mm')}">
            26/05/2026 14:30
        </span>
    </td>
   
 <td class="align-middle text-end">
        <a th:if="${not #lists.isEmpty(ec.modulos)}" 
           th:href="@{/profesor/calificar/{estudianteId}/{idCurso}/{idModulo}(estudianteId=${ec.estudiante.id},idCurso=${ec.id},idModulo=${ec.modulos[0].moduloId})}" 
           class="btn btn-sm btn-primary">
            <i class="bi bi-pencil-square"></i> Calificar
        </a>
    </td>
			</tr>
		</tbody>
	</table>
    <div th:replace="~{fragments/paginacionComun :: paginador(${paginacion}, '')}"></div>
 </div>
 </div>
</section>
</body>
</html>
