<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title th:text="#{curso.lista}">Título</title>
</head>
<body>
<section>
 <div class="container">
	<h1 th:text="#{comun.lista(#{curso.lista})}">Accesos</h1>
	<div class="form-group">
	    <div class="col-md-2 d-flex align-items-end" th:insert="~{fragments/botones :: btnLink(
			        #{command.volver}, 
			        ${urlBack}, 
			        'btn-outline-secondary', 'bi-arrow-left'
			     )}">
	    </div>
	</div>
	<div th:if="${pagina.empty}" class="alert alert-success d-flex align-items-center th-shadow-sm" role="alert">
    <!-- El ícono verde de éxito indica que todo está corregido -->
    <i class="bi bi-check-circle-fill me-2 fs-4 text-success"></i>
    <div>
        <strong th:text="#{panel.profesor.tareas}">Tareas</strong>: ¡Buen trabajo! No tienes tareas pendientes de corrección en este momento.
    </div>
</div>

<!-- 2. TABLA: Solo se renderiza si SÍ existen tareas pendientes -->
<div th:unless="${pagina.empty}" class="table-responsive shadow-sm rounded">
	
	<table class="table table-striped table-bordered">
		<thead class="table-dark">
			<tr>
				<th th:text="#{curso.titulo}">default</th>
				<th th:text="#{comun.descripcion}">default</th>
				<th th:text="#{areatematica.title}">default</th>
				<th th:text="#{curso.duracion}">default</th>
				<th th:text="#{curso.inscritos}">default</th>
				<th th:text="#{comun.fini}">default</th>
				<th th:text="#{comun.fFin}">default</th>
				<th></th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="ec : ${paginacion.contenido}">
				<td > <th:block th:if="${ec.curso.uriImagen} != null and ${ec.curso.uriImagen} != ''">
						<img th:src="@{/images/curso/{img}(img=${ec.curso.uriImagen})}"
	                 class="img-thumbnail"
	                 style="width: 40px; height: 40px; object-fit: cover; vertical-align: middle; margin-right: 8px;">
	                 </th:block>
				<span th:text="${ec.curso.titulo}">ID</span>
				</td>
				<td class="align-middle fw-semibold" th:text="${ec.estudiante.nombreCompleto}">
        			Juan Pérez Gómez
    			</td>
    			   <td class="align-middle">
        <span th:if="${not #lists.isEmpty(ec.modulos)}" th:text="${ec.modulos[0].titulo}">
            Introducción a Java
        </span>
    </td>
				  <td class="align-middle text-muted">
        <span th:if="${not #lists.isEmpty(ec.modulos)}" 
              th:text="${#temporals.format(ec.modulos[0].fechaEntrega, 'dd/MM/yyyy HH:mm')}">
            26/05/2026 14:30
        </span>
    </td>
   
 <td class="align-middle text-end">
        <a th:if="${not #lists.isEmpty(ec.modulos)}" 
           th:href="@{/profesor/calificar/{id}(id=${ec.modulos[0].id})}" 
           class="btn btn-sm btn-primary">
            <i class="bi bi-pencil-square"></i> Calificar
        </a>
    </td>
			</tr>
		</tbody>
	</table>
    <div th:replace="~{fragments/paginacionComun :: paginador(${paginacion}, '')}"></div>
 </div>
 </div>
</section>
</body>
</html>
