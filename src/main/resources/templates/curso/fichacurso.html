<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title th:text="#{curso.lista}">Título</title>
</head>
<body>
<section>
<div class="container py-5" th:object="${curso}">

    <!-- CABECERA -->
    <div class="row mb-4">
        <div class="col-md-5">
            <img th:src="@{'/images/curso/' + *{uriImagen}}"
                 class="img-fluid rounded shadow-sm"
                 alt="Imagen del curso">
        </div>

        <div class="col-md-7 d-flex flex-column justify-content-between">

            <div>
                <h1 class="fw-bold" th:text="*{titulo}">Título del curso</h1>

                <p class="text-muted fs-5" th:text="*{descripcion}">
                    Descripción del curso...
                </p>
            </div>

            <!-- Valoración + Usuarios -->
            <div class="d-flex justify-content-between align-items-center mt-3">
                <span class="fw-semibold fs-5">
                    ⭐ <span th:text="*{valoracion}">4.8</span> / 5
                </span>

                <span class="fw-semibold text-secondary fs-6">
                    👥 <span th:text="*{usuariosRegistrados}">0</span> <span th:text="#{curso.inscritos}">inscritos</span>
                </span>
            </div>

            <!-- Botón de suscripción -->
            <div class="mt-4">
                <a th:href="@{'/subscribircurso/' + *{id} }"
                   class="btn btn-primary btn-lg px-4" th:text="#{curso.subscribirse}">
                    Suscribirse al curso
                </a>
            </div>
        </div>
    </div>

    <hr class="my-5">

<!-- FICHA TÉCNICA -->
<h3 class="fw-bold mb-3" th:text="#{curso.ficha.title}">Ficha técnica</h3>

	<div class="row mb-4">
	
	    <div class="col-md-4">
	        <p><strong th:text="#{comun.fini}">Fecha inicio</strong>:
	            <span th:text="${#temporals.format(curso.fIni, 'dd/MM/yyyy')}"></span>
	        </p>
	    </div>
	
	    <div class="col-md-4">
	        <p><strong th:text="#{comun.fFin}">Fecha fin</strong>:
	            <span th:text="${#temporals.format(curso.fFin, 'dd/MM/yyyy')}"></span>
	        </p>
	    </div>
	
	    <div class="col-md-4">
	        <p><strong th:text="#{curso.nivel}">Nivel</strong>:
	            <span th:text="${curso.nivel}"></span>
	        </p>
	    </div>
	
	</div>
	
	<div class="row mb-4">
	
	    <div class="col-md-6">
	        <p><strong>👨‍🏫 <span th:text="#{curso.responsable}">Responsable</span>:</strong> <span th:text="${curso.nombreResponsable}"></span></p>
	    </div>
	
	    <div class="col-md-6">
	        <p><strong>⏱ <span th:text="#{curso.duracion}">Duración</span>:</strong> <span th:text="${curso.duracion}"></span> <span th:text="#{curso.ficha.horas}">horas</span></p>
	    </div>
	
	</div>

    <hr class="my-5">

    <!-- MÓDULOS -->
    <h3 class="fw-bold mb-3" th:text="#{curso.modulos}">Módulos del curso</h3>

    <div th:if="${curso.modulos != null}">
		<div class="accordion" id="modulosAccordion">
		
		    <div class="accordion-item mb-2"
		         th:each="modulo, i : ${curso.modulos}">
		         
		        <h2 class="accordion-header" th:attr="id='modulo-'+${i.index}">
		            <button class="accordion-button collapsed"
		                    type="button"
		                    data-bs-toggle="collapse"
		                    th:attr="data-bs-target='#collapse-'+${i.index}">
		                <span class="fw-bold" th:text="${modulo.titulo}"></span>
		                <span class="badge bg-secondary ms-3"><span th:text="#{curso.modulo.peso}">Peso</span>: <span th:text="${modulo.peso}"></span></span>
		            </button>
		        </h2>
		
		        <div th:attr="id='collapse-'+${i.index}"
		             class="accordion-collapse collapse"
		             th:attrappend="aria-labelledby='modulo-'+${i.index}"
		             data-bs-parent="#modulosAccordion">
		
		            <div class="accordion-body">
		
		                <p class="text-muted" th:text="${modulo.descripcion}"></p>
		
		                <div class="mt-3">
		                    <strong><span th:text="#{curso.modulo.contenido}">Contenido</span>:</strong>
		                    <p th:text="${modulo.contenido}"></p>
		                </div>
		
		                <div class="mt-3">
		                    <span th:if="${modulo.requiereEntrega}"
		                          class="badge bg-warning text-dark me-2" th:text="#{curso.modulo.requiereEntrega}">Requiere entrega</span>
		
		                    <span th:if="${modulo.finalizacionAutomatica}"
		                          class="badge bg-info text-dark" th:text="#{curso.modulo.finalizacionAutomatica}">Finalización automática</span>
		                </div>
		
		            </div>
		        </div>
		
		    </div>
		
		</div>

    </div>

    <hr class="my-5">

    <!-- CONTENIDOS EXTRA -->
    <div th:if="${curso.extras != null}">
        <h3 class="fw-bold mb-3" th:text="#{curso.contenidosExtra}">Contenidos extra</h3>

        <ul class="list-group">
            <li class="list-group-item"
                th:each="extra : ${curso.extras}"
                th:text="${extra}">
                Contenido extra...
            </li>
        </ul>
    </div>
    <div class="col-md-2 d-flex align-items-end" th:insert="~{fragments/botones :: btnLink(
		        #{command.volver}, 
		        ${urlBack}, 
		        'btn-outline-secondary', 'bi-arrow-left'
		     )}">
    </div>

</div>
 <script th:src="@{/js/enviarvaloracion.js}"></script>
</section>
</body>
</html>
