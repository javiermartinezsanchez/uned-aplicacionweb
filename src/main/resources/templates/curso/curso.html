<section>
 <h1 th:text="#{curso.title}">Título</h1>
<div th:replace="~{fragments/mensajesresultado :: mensajes}"></div>
<div th:replace="~{fragments/mensajesresultado :: errorgeneral}"></div>
<form th:action="@{${url}}" th:object="${form}" method="post"
      enctype="multipart/form-data">

    <input type="hidden" th:field="*{id}"/>
    <input type="hidden" th:field="*{uriImagen}"/>
<div class="row p-3 g-4">
    <!-- COLUMNA IZQUIERDA: Imagen y su botón de carga -->
    <div class="col-md-4">
        <label class="form-label fw-bold" th:text="#{curso.imagen}">Imagen del curso</label>
        
        <div class="mt-2 mb-3" th:if="*{uriImagen} != null and *{uriImagen} != ''">
            <img th:src="@{/images/curso/{img}(img=*{uriImagen})}"
                 class="img-thumbnail"
                 style="max-width: 200px; height: auto; object-fit: contain;">
        </div>
        
        <!-- El input de archivo queda perfectamente posicionado debajo de la foto -->
        <input type="file" class="form-control" name="imagen" accept="image/*">
    </div>

    <!-- COLUMNA DERECHA: Título arriba y Descripción abajo -->
    <div class="col-md-8 d-flex flex-column justify-content-between">
        <!-- Bloque del Título -->
        <div class="mb-3">
            <label class="form-label fw-bold" th:text="#{curso.titulo}">Título</label>
            <input type="text" class="form-control" th:field="*{titulo}">
            <div class="text-danger small mt-1" th:errors="*{titulo}"></div>
        </div>
        
        <!-- Bloque de la Descripción (Se acopla de forma natural debajo del título) -->
        <div class="mb-0">
            <label class="form-label fw-bold" th:text="#{comun.descripcion}">Descripción</label>
            <textarea class="form-control" th:field="*{descripcion}" rows="3"></textarea>
            <div class="text-danger small mt-1" th:errors="*{descripcion}"></div>
        </div>
    </div>
</div>

<div class="row g-3 align-items-end mb-4">
  
  <!-- 1. Área Temática (Compactado) -->
  <div class="col-md-2">
    <label class="form-label fw-bold" th:text="#{areatematica.title}">Área Temática</label>
    <select class="form-select" th:field="*{areaTematicaId}">
        <option th:value="${''}" th:text="#{comun.select.any}"></option>
        <option th:each="a : ${areas}" th:value="${a.id}" th:text="${a.titulo}"></option>
    </select>
    <div class="text-danger" th:errors="*{areaTematicaId}"></div>
  </div>
  
  <!-- 2. Nivel -->
  <div class="col-auto">
    <label class="form-label fw-bold" th:text="#{curso.nivel}">Nivel</label>
    <input type="number" class="form-control" style="width: 6ch;" th:field="*{nivel}">
    <div class="text-danger" th:errors="*{nivel}"></div>
  </div>
  
  <!-- 3. Duración -->
  <div class="col-auto">
    <label class="form-label fw-bold" th:text="#{curso.duracion}"></label>
    <input type="number" class="form-control" style="width: 7ch;" th:field="*{duracion}">        
    <div class="text-danger" th:errors="*{areaTematicaId}"></div>
  </div>
  
  <!-- 4. Fecha Inicio -->
  <div class="col-auto">
    <label class="form-label fw-bold" th:text="#{comun.fini}">Fecha Inicio</label>
    <input type="date" class="form-control" th:field="*{fIni}">
    <div class="text-danger" th:errors="*{fIni}"></div>
  </div>
  
  <!-- 5. Fecha Fin -->
  <div class="col-auto">
    <label class="form-label fw-bold" th:text="#{comun.fFin}">Fecha Fin</label>
    <input type="date" class="form-control" th:field="*{fFin}">
    <div class="text-danger" th:errors="*{fFin}"></div>
  </div>
  
  <!-- 6. Responsable (Cambiado col-md-3 a col-md para que consuma de forma flexible el espacio libre) -->
  <div class="col-md" sec:authorize="hasAnyRole('ADMIN')">
    <label class="form-label fw-bold" th:text="#{curso.responsable}">Responsable</label>
    <select class="form-select" th:field="*{responsableId}">
        <option th:value="${''}" th:text="#{responsable.select}"></option>
        <option th:each="u : ${usuarios}" th:value="${u.id}" th:text="${u.nombreCompleto}"></option>
    </select>
    <div class="text-danger" th:errors="*{responsableId}"></div>
  </div>
  
  <!-- CORRECCIÓN CLAVE: El input oculto ya no se mete dentro de un div que rompa la rejilla -->
  <input type="hidden" th:field="*{responsableId}" sec:authorize="hasAnyRole('PROFE')"/>
  
  <!-- 7. Estado (Con un ancho fijo controlado de col-md-2) -->
  <div class="col-md-2">
    <label class="form-label fw-bold">Estado</label>
    <select class="form-select" th:field="*{estado}">
        <option th:each="est : ${T(es.alumno.uned.model.entities.EstadoCursoModulo).values()}"
                th:if="${est.esValidoParaCurso()}"
                th:value="${est}"
                th:text="${est}">ACTIVO</option>
    </select>
  </div>

</div>


    <div class="card mb-4 border-tertiary">
        <div class="card-header bg-body-tertiary text-black">
			<a class="d-inline-flex align-items-center text-dark text-decoration-none" 
               data-bs-toggle="collapse" href="#datosModulo" role="button" aria-expanded="false">
        		<span class="me-2 icono-giro">▼</span>
        		<h5 class="mb-0" th:text="#{curso.modulo.cabecera}">ssss</h5>
    		</a>
        </div>
        <div class="collapse"  id="datosModulo">
        <div class="card-body">
            <div class="row g-3 align-items-end mb-4">
                <div class="col-md-8">
                    <select id="selectorModulos" class="form-select">
                        <option th:value="${''}" th:text="#{curso.modulo.select}" th:selected="${true}" th:disabled="${true}"></option>
                        <option th:each="m : ${modulosDisponibles}" 
                                th:value="${m.id}" 
                                th:text="${m.titulo}"
                                th:disabled="${form.modulos != null and #lists.contains(form.modulos.![moduloId], m.id)}">
                    </select>
                </div>
                <div class="col-md-4">
                    <button type="button" onclick="addModuloRow()" class="btn btn-outline-success w-100">
                        <i class="bi bi-plus-lg"></i> <span th:text="#{curso.modulo.add}">Añadir al listado</span>
                    </button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle" id="tablaItinerario">
                    <thead class="table-light">
                        <tr>
                            <th th:text="#{curso.modulos}">Módulo</th>
                            <th style="width: 100px;" th:text="#{curso.modulo.orden}">Orden</th>
                            <th style="width: 120px;"><span th:text="#{curso.modulo.peso}"></span> %</th>
                            <th style="width: 50px;"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rel, iter : *{modulos}">
                            <td>
                                <span th:text="${rel.nombreModulo}">Módulo</span>
                                <input type="hidden" th:field="*{modulos[__${iter.index}__].cursoId}" />
                                <input type="hidden" th:field="*{modulos[__${iter.index}__].moduloId}" />
                            </td>
                            <td>
                                <input type="number" th:field="*{modulos[__${iter.index}__].orden}" class="form-control form-control-sm" />
                            </td>
                            <td>
	                            <div class="input-group">
	                                <input type="number" th:field="*{modulos[__${iter.index}__].peso}" class="form-control"  min="5" max="100" step="5"/>
	                    			<span class="input-group-text">%</span>
	                            </div>
                            </td>
                            <td>
                                <button type="button" class="btn text-danger" 
                                        th:onclick="|removeModuloRow(this, '${rel.moduloId}')|">
                                    <i class="bi bi-x-circle-fill"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
           
        </div>
        </div>
    </div>
	<div th:replace="~{fragments/cursofragments :: gestioncontenidoExtra}"></div>

    <div th:replace="~{fragments/botones :: btnGroup(#{command.save}, #{command.cancel}, @{${urlCancel}})}"></div>
 
</form>


<script>
function addModuloRow() {
    const select = document.getElementById('selectorModulos');
    const cursoId = document.getElementById('id').value;
    const moduloId = select.value;
    const nombre = select.options[select.selectedIndex].text;

    if (!moduloId) return;

    const tbody = document.querySelector('table tbody');
    const index = tbody.rows.length; // Siguiente índice disponible

    const row = `
        <tr>
            <td>
                <span>${nombre}</span>
                <input type="hidden" name="modulos[${index}].cursoId" value="${cursoId}" />
                <input type="hidden" name="modulos[${index}].moduloId" value="${moduloId}" />
            </td>
            <td>
                <input type="number" name="modulos[${index}].orden" class="form-control" value="${index + 1}" />
            </td>
            <td>
                <div class="input-group">
                    <input type="number" name="modulos[${index}].peso" class="form-control" value="10" min="5" max="100" step="5" />
                    <span class="input-group-text">%</span>
                </div>
            </td>
            <td>
                <button type="button" class="btn text-danger" onclick="removeModuloRow(this, '${moduloId}')">
    	            <i class="bi bi-x-circle-fill"></i>
	            </button>                
            </td>
        </tr>
    `;

    tbody.insertAdjacentHTML('beforeend', row);
    
    // Deshabilitar la opción en el select para no duplicar
    select.options[select.selectedIndex].disabled = true;
    select.value = "";
}
function removeModuloRow(button, moduloId) {
    // 1. Localizar la fila y eliminarla
    const row = button.closest('tr');
    row.remove();

    // 2. Reactivar la opción en el select
    const select = document.getElementById('selectorModulos');
    const options = select.options;

    for (let i = 0; i < options.length; i++) {
        if (options[i].value == moduloId) {
            options[i].disabled = false;
            break;
        }
    }
}
function addContenidoExtraRow() {
    const tableBody = document.querySelector('#tablaContenidos tbody');
    const index = tableBody.rows.length;
    
    const row = `
        <tr>
            <td>
                <input type="text" name="contenidosExtra[${index}].descripcion" class="form-control" required />
            </td>
            <td>
                <select name="contenidosExtra[${index}].tipoContenido" class="form-select" onchange="toggleInputType(this, ${index})">
                    <option value="EXTERNO">Externo (URL)</option>
                    <option value="PROPIO">Propio (Archivo)</option>
                </select>
            </td>
            <td>
                <div id="wrapper-input-${index}">
                    <input type="url" name="contenidosExtra[${index}].uri" class="form-control" placeholder="https://..." />
                </div>
            </td>
            <td>
                <button type="button" class="btn text-danger" onclick="this.closest('tr').remove()">
                	<i class="bi bi-x-circle-fill"></i>
            	</button>
            </td>
        </tr>
    `;
    tableBody.insertAdjacentHTML('beforeend', row);
}

function toggleInputType(select, index) {
    const wrapper = document.getElementById(`wrapper-input-${index}`);
    if (select.value === 'PROPIO') {
        // Si es propio, cambiamos a input file. 
        wrapper.innerHTML = `<input type="file" name="archivoExtra_${index}" class="form-control" />`;
    } else {
        wrapper.innerHTML = `<input type="url" name="contenidosExtra[${index}].uri" class="form-control" placeholder="https://..." />`;
    }
}
</script>
