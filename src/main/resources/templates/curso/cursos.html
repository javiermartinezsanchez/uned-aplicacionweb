
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title th:text="#{curso.lista}">Título</title>
</head>
<body>
<section>
	<div class="container">
		<h1 th:text="#{comun.lista(#{curso.lista})}">Accesos</h1>
		<div class="form-group">
		<form class="row g-3 mb-4" method="get" th:action="@{/curso}">

    <!-- TÍTULO -->
    <div class="col-md-3">
        <label class="form-label" th:text="#{curso.titulo}">Título</label>
        <input type="text" name="titulo" class="form-control"
               th:value="${param.titulo}">
    </div>

    <!-- NIVEL -->
    <div class="col-md-2">
        <label class="form-label" th:text="#{curso.nivel}">Nivel</label>
        <select name="nivel" class="form-select">
            <option value="">-- Todos --</option>
            <option th:each="n : ${#numbers.sequence(1,5)}"
                    th:value="${n}"
                    th:text="'Nivel ' + ${n}"
                    th:selected="${param.nivel == n}">
            </option>
        </select>
    </div>

    <!-- ÁREA TEMÁTICA -->
    <div class="col-md-3">
        <label class="form-label" th:text="#{areatematica.title}">Área temática</label>
        <select name="areaId" class="form-select">
            <option th:value="${''}" th:text="#{areatematica.select}"></option>
            <option th:each="a : ${areas}"
                    th:value="${a.id}"
                    th:text="${a.titulo}"
                    th:selected="${param.areaId == a.id}">
            </option>
        </select>
    </div>

    <!-- RESPONSABLE -->
    <div class="col-md-3">
        <label class="form-label" th:text="#{curso.responsable}">Responsable</label>
        <select name="responsableId" class="form-select">
            <option value="">-- Todos --</option>
            <option th:each="u : ${responsables}"
                    th:value="${u.id}"
                    th:text="${u.nombreCompleto}"
                    th:selected="${param.responsableId == u.id}">
            </option>
        </select>
    </div>

    <!-- FECHAS -->
    <div class="col-md-2">
        <label class="form-label" th:text="#{comun.fini}">Fecha inicio</label>
        <input type="date" name="fIni" class="form-control"
               th:value="${param.fIni}">
    </div>

    <div class="col-md-2">
        <label class="form-label" th:text="#{comun.fFin}">Fecha fin</label>
        <input type="date" name="fFin" class="form-control"
               th:value="${param.fFin}">
    </div>

    <!-- BOTONES -->
    <div class="col-md-2 d-flex align-items-end" th:insert="~{fragments/botones :: btnSubmit(
		        #{command.buscar},
		        'btn-primary w-100',
		        'bi-search'
		    )}">">
    </div>
   <div class="col-md-2 d-flex align-items-end" th:insert="~{fragments/botones :: btnLink(
		        #{command.limpiar},
		        @{/curso},
		        'btn-secondary w-100',
		        'bi-arrow-counterclockwise'
		    )}">
    </div>
	<div class="col-md-2 d-flex align-items-end" th:insert="~{fragments/botones :: btnLink(
        #{mensaje.nuevo} + ' ' + #{curso.title},
        @{${urlAlta}},
        'btn-success', 'bi bi-plus-circle'
    )}">
    </div>
    <div class="col-md-2 d-flex align-items-end" th:insert="~{fragments/botones :: btnLink(
		        #{command.volver}, 
		        ${urlBack}, 
		        'btn-outline-secondary', 'bi-arrow-left'
		     )}">
    </div>
    

</form>
		
		</div>

		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th th:text="#{curso.titulo}">default</th>
					<th th:text="#{comun.descripcion}">default</th>
					<th th:text="#{comun.fini}">default</th>
					<th th:text="#{comun.fFin}">default</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="curso : ${paginacion.contenido}">
					<td th:text="${curso.titulo}">ID</td>
					<td th:text="${curso.descripcion}">ID</td>
					<td th:text="${#temporals.format(curso.fIni, 'dd/MM/yyyy')}">ID</td>
					<td th:text="${#temporals.format(curso.fFin, 'dd/MM/yyyy')}">ID</td>
					<td><a th:href="@{/{url}/curso/{id}(url=${url},id=${curso.id})}" class="btn btn-primary" ><i class="bi bi-pencil-square"></i></a></td>
				</tr>
			</tbody>
		</table>
        <div th:replace="~{fragments/paginacionComun :: paginador(${paginacion}, ${query})}"></div>
	</div>
</section>
</body>
</html>
