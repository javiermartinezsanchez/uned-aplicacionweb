<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title th:text="#{curso.lista}">Título</title>
</head>
<body>
<section>
	<div class="container">
		<h1 th:text="#{curso.lista}">Título</h1>
		<br>
		<div class="form-group">
			<span><a th:href="@{/admin/newCurso}" th:text="#{mensaje.nuevo} + ' ' + #{curso.titulo} ">pendiente</a></span>
		</div>

		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th th:text="#{curso.titulo}">default</th>
					<th th:text="#{curso.descripcion}">default</th>
					<th th:text="#{curso.fini}">default</th>
					<th th:text="#{curso.fFin}">default</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="curso : ${lista}">
					<td th:text="${curso.titulo}">ID</td>
					<td th:text="${curso.descripcion}">ID</td>
					<td th:text="${#temporals.format(curso.fIni, 'dd/MM/yyyy HH:mm:ss')}">ID</td>
					<td th:text="${#temporals.format(curso.fFin, 'dd/MM/yyyy HH:mm:ss')}">ID</td>
					<td><a th:href="@{/admin/curso/{id}(id=${curso.id})}" class="btn btn-primary" th:text="#{command.modificar}">traduciones</a></td>
				</tr>
			</tbody>
		</table>
		<th:block th:if="${paginacion}">
		<nav th:replace="~{fragments/paginaciontabla :: paginaciontabla}"></nav>
		</th:block>
	</div>
</section>
</body>
</html>
