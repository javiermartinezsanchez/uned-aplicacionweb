<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title th:text="#{error.500.title}">Error interno</title>
   <link rel="stylesheet" th:href="@{/webjars/bootstrap/{version}/css/bootstrap.min.css(version=${@webjarsConfig.bootstrap})}" />
   <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/{version}/font/bootstrap-icons.css(version=${@webjarsConfig.bootstrapicons})}"/>
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-sm border-0">
                <div class="card-body text-center py-5">

                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 4rem;"></i>

                    <h1 class="mt-4" th:text="#{error.500.heading}">
                        500.heading
                    </h1>

                    <p class="text-muted mt-3" th:text="#{error.500.message}">
                       500.message Se ha producido un problema interno. Por favor, inténtalo de nuevo más tarde.
                    </p>

                    <a th:href="@{/}" class="btn btn-primary mt-4">
                        <i class="bi bi-house"></i>
                        <span th:text="#{error.back}">500.back Volver al inicio</span>
                    </a>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
