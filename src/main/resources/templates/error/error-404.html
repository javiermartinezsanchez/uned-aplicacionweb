<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error 404</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f7fa; }
        .error-container { max-width: 500px; margin-top: 80px; }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center">
    <div class="error-container text-center">

        <div class="card shadow-sm p-4">
            <h1 class="display-5 text-warning">404</h1>
            <h4 class="mt-2">Página no encontrada</h4>

            <p class="mt-3">La página que buscas no existe o ha sido movida.</p>

            <a th:href="@{/}" class="btn btn-primary mt-3">Volver al inicio</a>
        </div>

    </div>
</div>

</body>
</html>
