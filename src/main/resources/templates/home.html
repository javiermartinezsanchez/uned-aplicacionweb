<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
      th:replace="~{plantilla::layout(~{::content})}">
<head>
  <title>titulo</title>
</head>
<body>
  <section th:fragment="content">
    <div class="container">

    	<h3 th:text="#{home.lista.cursos.mas.vistos}"></h3>
    	<div th:if="${paginacion.contenido.empty}" class="alert alert-primary d-flex align-items-center th-shadow-sm" role="alert">
		    <i class="bi bi-exclamation-circle me-2 fs-4"></i>
		    <div>
		        <strong th:text="#{home.lista.cursos.noexiste}"></strong>
		    </div>
	    </div>
		<div th:unless="${paginacion.contenido.empty}" class="album pt-3 pb-2 bg-body-tertiary"> 
		    <div class="container position-relative px-5 mt-2">
		        <div id="bloqueMasVisitados" class="w-99">
		            <div th:replace="~{fragments/paginacionComun :: navegacionLateralAJAX(${paginacion}, 'bloqueMasVisitados', '/cursos/ajax/masvisitados')}"></div>
		            <div class="row row-cols-1 row-cols-md-3 g-4" style="width: 100% !important; min-width: 100%;"> 
		                <div class="col" th:each="curso : ${paginacion.contenido}">
		                    <div th:insert="~{fragments/cursofragments :: cursoCard(${curso})}" class="w-100"></div>
		                </div>
		            </div>
		        </div>
		    </div>
		</div>
		<h3 th:text="#{home.lista.cursos.mas.valorados}"></h3>
		<div th:if="${paginacionMV.contenido.empty}" class="alert alert-primary d-flex align-items-center th-shadow-sm" role="alert">
		    <i class="bi bi-exclamation-circle me-2 fs-4"></i>
		    <div>
		        <strong th:text="#{home.lista.cursos.noexiste}"></strong>
		    </div>
	    </div>
		<div th:unless="${paginacionMV.contenido.empty}" class="album pt-3 pb-2 bg-body-tertiary"> 
		    <div class="container position-relative px-5 mt-2">
		        <div id="bloqueMasValorados" class="w-99">
		            <div th:replace="~{fragments/paginacionComun :: navegacionLateralAJAX(${paginacionMV}, 'bloqueMasValorados', '/cursos/ajax/masvalorados')}"></div>
		            <div class="row row-cols-1 row-cols-md-3 g-4" style="width: 100% !important; min-width: 100%;"> 
		                <div class="col" th:each="curso : ${paginacionMV.contenido}">
		                    <div th:insert="~{fragments/cursofragments :: cursoCard(${curso})}" class="w-100"></div>
		                </div>
		            </div>
		        </div>
		    </div>
		</div>
		<h3 th:text="#{home.lista.cursos.mas.subscritos}"></h3>
		<div th:if="${paginacionME.contenido.empty}" class="alert alert-primary d-flex align-items-center th-shadow-sm" role="alert">
		    <i class="bi bi-exclamation-circle me-2 fs-4"></i>
		    <div>
		        <strong th:text="#{home.lista.cursos.noexiste}"></strong>
		    </div>
	    </div>
		<div th:unless="${paginacionME.contenido.empty}" class="album pt-3 pb-2 bg-body-tertiary"> 
		    <div class="container position-relative px-5 mt-2">
		        <div id="bloqueMasSubscritos" class="w-99">
		            <div th:replace="~{fragments/paginacionComun :: navegacionLateralAJAX(${paginacionME}, 'bloqueMasSubscritos', '/cursos/ajax/massubscritos')}"></div>
		            <div class="row row-cols-1 row-cols-md-3 g-4" style="width: 100% !important; min-width: 100%;"> 
		                <div class="col" th:each="curso : ${paginacionME.contenido}">
		                    <div th:insert="~{fragments/cursofragments :: cursoCard(${curso})}" class="w-100"></div>
		                </div>
		            </div>
		        </div>
		    </div>
		</div>
	</div>	
		<script th:src="@{/webjars/jquery/{version}/jquery.min.js(version=${@webjarsConfig.jquery})}"></script>
		<script th:src="@{/js/navegacionHome.js}"></script>
  </section>

</body>
</html>
