<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title th:text="#{modulo.lista}">Título</title>
</head>
<body>
<section>
 <div class="container">
		<div class="d-flex justify-content-between align-items-center mb-4">
	        <h1 class="mb-0" th:text="#{comun.lista(#{modulo.lista})}">Título</h1>
	        
	        <div class="d-flex gap-2">
	            <a th:replace="~{fragments/botones :: btnLink(
	     			 #{mensaje.nuevo} + ' ' + #{modulo.title},
		       		 @{${urlAlta}},
		        	'btn-success', 'bi bi-plus-circle'
	                )}">
	            </a>
	            <a th:replace="~{fragments/botones :: btnVolver(${urlBack})}"></a>

	        </div>
	    </div>	
	<div class="form-group">
		<form class="row g-3 align-items-end mb-4" method="get" th:action="@{/modulo}">
		    <div class="col-md-3">
		        <label class="form-label" th:text="#{curso.titulo}">Título</label>
		        <input type="text" name="titulo" class="form-control"
		               th:value="${paramsBusqueda['titulo']}">
		    </div>
			<div class="col-md-3">
	            <label class="form-label" th:text="#{modulo.tipo}">Tipo de Módulo</label>
	            <select name="tipo" class="form-select">
	                <option th:value="${''}" th:text="#{comun.select.any}">Seleccione tipo...</option>
	                <option th:each="t : ${tipos}"
	                        th:value="${t}"
	                        th:text="${t}"
	                        th:selected="${paramsBusqueda['tipo'] == t.name}">
	                </option>
	            </select>
	        </div>
		    <div class="col-md-4 d-flex gap-2">
		    <div th:insert="~{fragments/botones :: btnSubmit(
			        #{command.buscar},
			        'btn-primary w-100',
			        'bi-search'
			        )}">
	            </div>
		    		    <div th:insert="~{fragments/botones :: btnReset()}">
	            </div>
		    </div>
		</form>
	</div>

		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th th:text="#{curso.titulo}">default</th>
					<th th:text="#{comun.descripcion}">default</th>
					<th th:text="#{modulo.tipo}">default</th>
					<th th:text="#{usuario.title}">default</th>
					<th th:text="#{comun.fIns}">default</th>
					
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="modulo : ${paginacion.contenido}">
					<td class="text-truncate" style="max-width: 150px;" th:text="${modulo.titulo}">ID</td>
					<td class="text-truncate" style="max-width: 350px;" th:text="${modulo.descripcion}">ID</td>
					<td th:text="${modulo.tipo}">ID</td>
					<td th:text="${modulo.userIns}">ID</td>
					<td th:text="${#temporals.format(modulo.fIns, 'dd/MM/yyyy')}">ID</td>
					<td><a th:href="@{{url}{id}(url=${url},id=${modulo.id})}" class="btn btn-primary" ><i class="bi bi-pencil-square"></i></a></td>
				</tr>
			</tbody>
		</table>
        <div th:replace="~{fragments/paginacionComun :: paginador(${paginacion}, '')}"></div>
	</div>
 </section>
</body>
</html>
