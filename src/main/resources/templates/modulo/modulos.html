<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title th:text="#{modulo.lista}">Título</title>
</head>
<body>
<section>
 <div class="container">
	<h1 th:text="#{comun.lista(#{modulo.lista})}">Accesos</h1>
	<div class="form-group">
		<form class="row g-3 mb-4" method="get" th:action="@{/modulo}">
		    <div class="col-md-3 d-flex align-items-end">
		        <label class="form-label" th:text="#{curso.titulo}">Título</label>
		        <input type="text" name="titulo" class="form-control"
		               th:value="${paramsBusqueda['titulo']}">
		    </div>
			<div class="col-md-4 mb-3 d-flex align-items-end">
	            <label class="form-label" th:text="#{modulo.tipo}">Tipo de Módulo</label>
	            <select name="tipo" class="form-select">
	                <option th:value="${''}" th:text="#{comun.select.any}">Seleccione tipo...</option>
	                <option th:each="t : ${tipos}"
	                        th:value="${t}"
	                        th:text="${t}"
	                        th:selected="${paramsBusqueda['tipo'] == t.name}">
	                </option>
	            </select>
	           
	        </div>
		
		    <div class="col-md-2 d-flex align-items-end" th:insert="~{fragments/botones :: btnSubmit(
				        #{command.buscar},
				        'btn-primary w-100',
				        'bi-search'
				    )}">">
		    </div>
		    <div class="col-md-2 d-flex align-items-end" th:insert="~{fragments/botones :: btnLink(
				        #{command.limpiar},
				        @{/curso},
				        'btn-secondary w-100',
				        'bi-arrow-counterclockwise'
				    )}">
		    </div>
			<div class="col-md-2 d-flex align-items-end" th:insert="~{fragments/botones :: btnLink(
		        #{mensaje.nuevo} + ' ' + #{modulo.title},
		        @{${urlAlta}},
		        'btn-success', 'bi bi-plus-circle'
		    )}">
		    </div>
		    <div class="col-md-2 d-flex align-items-end" th:insert="~{fragments/botones :: btnLink(
				        #{command.volver}, 
				        ${urlBack}, 
				        'btn-outline-secondary', 'bi-arrow-left'
				     )}">
		    </div>
		</form>
	</div>

		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th th:text="#{curso.titulo}">default</th>
					<th th:text="#{comun.descripcion}">default</th>
					<th th:text="#{modulo.tipo}">default</th>
					<th th:text="#{usuario.title}">default</th>
					<th th:text="#{comun.fIns}">default</th>
					
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="modulo : ${paginacion.contenido}">
					<td th:text="${modulo.titulo}">ID</td>
					<td th:text="${modulo.descripcion}">ID</td>
					<td th:text="${modulo.tipo}">ID</td>
					<td th:text="${modulo.userIns}">ID</td>
					<td th:text="${#temporals.format(modulo.fIns, 'dd/MM/yyyy HH:mm')}">ID</td>
					<td><a th:href="@{/{url}/modulo/{id}(url=${url},id=${modulo.id})}" class="btn btn-primary" ><i class="bi bi-pencil-square"></i></a></td>
				</tr>
			</tbody>
		</table>
        <div th:replace="~{fragments/paginacionComun :: paginador(${paginacion}, ${query})}"></div>
	</div>
 </section>
</body>
</html>
