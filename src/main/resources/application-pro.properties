spring.application.name=app

# para compatibilizarlo con tomcat externo 
spring.web.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false


spring.messages.basename=traducciones
spring.messages.encoding=UTF-8

logging.level.es.alumno.uned=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
# thymeleaf 
spring.thymeleaf.cache=false

# variables para logback
app.log.ruta=/opt/logs/app
app.log.historial=7
app.log.tamano-maximo=10MB
app.log.limite-total=1GB
app.log.level=INFO

app.uploadImgDir=/opt/app/cursos/imagenes/
app.uplloaDocDir=/opt/app/cursos/docs/
