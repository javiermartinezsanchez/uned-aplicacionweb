spring.application.name=app
spring.messages.basename=traducciones
spring.messages.encoding=UTF-8


# Límite de los ficheros que se pueden subir
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=true

# Compatibilidad Tomcat externo / Docker 
spring.main.web-application-type=servlet
spring.web.error.whitelabel.enabled=true
spring.web.resources.add-mappings=true

# Establemos valores de tomcat para formularios con muchos campos (curso).
server.tomcat.max-parameter-count=2000
server.tomcat.max-part-count=2000
server.tomcat.max-http-form-post-size=10MB

logging.level.es.alumno.uned=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
# thymeleaf 
spring.thymeleaf.cache=false

# variables para logback
app.log.ruta=/tmp/logs/app
app.log.historial=7
app.log.tamano-maximo=10MB
app.log.limite-total=1GB
app.log.level=INFO

app.uploadImgDir=/tmp/cursos/imagenes/
app.uploadDocDir=/tmp/cursos/docs/
