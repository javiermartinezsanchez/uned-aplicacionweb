spring.application.name=app

# para compatibilizarlo con tomcat externo 
spring.web.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false


spring.messages.basename=traducciones
spring.messages.encoding=UTF-8

logging.level.es.alumno.uned=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# thymeleaf 
spring.thymeleaf.cache=false

app.uploadImgDir=/opt/app/cursos/imagenes/
app.uplloaDocDir=/opt/app/cursos/docs/
